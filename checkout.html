<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Secure Checkout - NovaStack</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="logo/jpeg" href="logo.png">
    <style>
        /* Your existing styles remain the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c1a 0%, #1a162a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .checkout-container {
            max-width: 550px;
            width: 100%;
            background: rgba(26, 22, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 2rem;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .checkout-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        
        .checkout-header h2 {
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }
        
        .checkout-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        
        .order-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .order-summary h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0 0 0;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .advance-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border: 1px solid #10b981;
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            margin: 1rem 0;
        }
        
        .advance-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.3rem;
        }
        
        .advance-amount {
            font-size: 2rem;
            font-weight: 800;
            color: #10b981;
        }
        
        .refund-note {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .btn-pay {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-pay:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        }
        
        .btn-pay:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-back {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        
        .btn-back:hover {
            border-color: #ff6b35;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            color: #ef4444;
            text-align: center;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            margin-top: 1rem;
        }
        
        .manual-confirm {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 1rem 0;
            text-align: center;
            display: none;
        }
        
        .manual-confirm.show {
            display: block;
            animation: pulse 2s infinite;
        }
        
        .btn-manual {
            background: #10b981;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-manual:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .btn-retry {
            background: #f59e0b;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            margin-left: 0.5rem;
        }
        
        .btn-retry:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
        
        @keyframes pulse {
            0%, 100% { border-color: #10b981; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { border-color: #10b981; box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }
        
        .payment-status {
            text-align: center;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 12px;
            display: none;
        }
        
        .payment-status.pending {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid #f59e0b;
            display: block;
        }
        
        .payment-status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            display: block;
        }
        
        .customization-badge {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid #7c3aed;
            border-radius: 12px;
            padding: 0.8rem;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
        
        @media (max-width: 480px) {
            .checkout-container {
                padding: 1.5rem;
            }
            .advance-amount {
                font-size: 1.5rem;
            }
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 0.8rem 1.5rem;
            background: #10b981;
            color: white;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.error {
            background: #ef4444;
        }
        
        .toast.warning {
            background: #f59e0b;
        }
        
        .error-card {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }
        
        .error-card i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <div class="logo">NovaStack</div>
            <h2><i class="fas fa-credit-card"></i> Secure Checkout</h2>
            <p>Pay 15% advance to confirm your order</p>
        </div>
        
        <div id="checkout-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading payment details...</p>
            </div>
        </div>
        
        <div id="manualConfirm" class="manual-confirm">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #10b981;"></i>
            <h3 style="margin: 0.5rem 0;">Payment Completed?</h3>
            <p style="color: rgba(255,255,255,0.7);">If you have completed the payment but not redirected, click below to confirm.</p>
            <button class="btn-manual" onclick="manualConfirm()">
                <i class="fas fa-check"></i> I Have Completed Payment
            </button>
        </div>
        
        <div id="paymentStatus" class="payment-status"></div>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            API: 'https://novastack-backend.onrender.com',
            FRONTEND: window.location.origin
        };
        
        // Global variables
        let paymentData = null;
        let isCartCheckout = false;
        let cartItems = [];
        let paymentAttemptCount = 0;
        let isCustomOrder = false;
        let customizationData = null;
        let pendingOrderData = null;
        
        // Get order details from URL
        const urlParams = new URLSearchParams(window.location.search);
        let serviceId = urlParams.get('service_id');
        let serviceTitle = decodeURIComponent(urlParams.get('title') || '');
        let totalPrice = parseFloat(urlParams.get('price') || 0);
        
        // 🔥 NEW: Check if this is a custom order with stored customization
        isCustomOrder = urlParams.get('custom') === '1';
        const storedCustomization = localStorage.getItem('pending_customization');
        const storedOrderData = localStorage.getItem('pending_order_data');  // 🔥 ADD THIS LINE
        
        // Try to get data from pending_order_data first (new method)
        if (storedOrderData && !storedCustomization) {
            try {
                const orderData = JSON.parse(storedOrderData);
                console.log('📦 Found pending_order_data:', orderData);
                
                // Override checkout data
                serviceId = orderData.service_id;
                serviceTitle = orderData.service_title;
                totalPrice = orderData.total_price;
                
                // Store customization for later use
                customizationData = {
                    customization: orderData.customization,
                    requirements: orderData.requirements,
                    timeline: orderData.timeline,
                    references: orderData.references
                };
                
                pendingOrderData = orderData;
                isCustomOrder = true;
                
                console.log('✅ Custom order loaded from pending_order_data');
                
            } catch(e) {
                console.error('Error parsing order data:', e);
            }
        }
        // Fallback to old method
        else if (isCustomOrder && storedCustomization) {
            try {
                const customData = JSON.parse(storedCustomization);
                console.log('📦 Custom order data found (legacy):', customData);
                
                // Override checkout data with custom data
                serviceId = customData.service_id;
                serviceTitle = customData.service_title;
                totalPrice = customData.total_price;
                
                // Store customization for later use
                customizationData = {
                    customization: customData.customization,
                    requirements: customData.requirements,
                    timeline: customData.timeline,
                    references: customData.references
                };
                
                pendingOrderData = customData;
                
                console.log('✅ Custom order loaded (legacy):', customizationData);
                
            } catch(e) {
                console.error('Error parsing custom data:', e);
                isCustomOrder = false;
            }
        }
        
        // Check for cart checkout
        cartItems = JSON.parse(localStorage.getItem('dc_cart_local') || '[]');
        isCartCheckout = cartItems.length > 0 && !serviceId;
        
        if (isCartCheckout && cartItems.length > 0) {
            totalPrice = cartItems.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
            serviceTitle = `Cart (${cartItems.length} items)`;
            serviceId = 0;
        }
        
        console.log('📦 Checkout Data:', { isCartCheckout, isCustomOrder, serviceId, serviceTitle, totalPrice });
        
        // ============================================================
        // AUTH HELPERS
        // ============================================================
        const Auth = {
            getToken() { 
                const token = localStorage.getItem('dc_token');
                console.log('🔑 Auth.getToken() called, token present:', !!token);
                if (!token) {
                    console.warn('⚠️ No token found in localStorage');
                }
                return token || ''; 
            },
            getUser() { 
                try { 
                    const user = localStorage.getItem('dc_user');
                    return user ? JSON.parse(user) : null; 
                } catch(e) { 
                    console.error('Error parsing user:', e);
                    return null; 
                } 
            },
            isLoggedIn() {
                return !!this.getToken();
            }
        };
        
        // ============================================================
        // UI HELPERS
        // ============================================================
        function showToast(message, type = 'success') {
            let toast = document.querySelector('.toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        
        function showError(message) {
            const container = document.getElementById('checkout-content');
            if (container) {
                container.innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Something went wrong</h3>
                        <p style="margin: 1rem 0;">${escapeHtml(message)}</p>
                        <button class="btn-back" onclick="window.location.href='${isCartCheckout ? 'cart.html' : (isCustomOrder ? 'order-customize.html?id=' + serviceId : 'services.html')}'">
                            ← Go Back
                        </button>
                        <button class="btn-retry" onclick="location.reload()" style="margin-left: 0.5rem;">
                            <i class="fas fa-sync"></i> Try Again
                        </button>
                    </div>
                `;
            }
            showToast(message, 'error');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================================
        // CHECK AUTHENTICATION
        // ============================================================
        function checkAuth() {
            const token = Auth.getToken();
            if (!token) {
                console.log('❌ No token found, redirecting to login');
                const currentUrl = encodeURIComponent(window.location.href);
                window.location.href = `login.html?redirect=${currentUrl}`;
                return false;
            }
            return true;
        }
        
        // ============================================================
        // LOAD PAYMENT
        // ============================================================
        async function loadPayment() {
            // Check authentication first
            if (!checkAuth()) {
                return;
            }
            
            const token = Auth.getToken();
            console.log('🔑 Token present for payment creation');
            
            if (!totalPrice || totalPrice <= 0) {
                showError('Invalid order amount. Please go back and try again.');
                return;
            }
            
            try {
                // 🔥 For custom orders, include customization data in the payment order
                let payload = {
                    service_id: parseInt(serviceId) || 0,
                    service_title: serviceTitle,
                    total_price: totalPrice,
                    quantity: isCartCheckout ? cartItems.length : 1
                };
                
                // If custom order, add customization and requirements
                if (isCustomOrder && customizationData) {
                    payload.customization = customizationData.customization;
                    payload.requirements = customizationData.requirements;
                    console.log('📝 Adding custom order data to payment payload');
                }
                
                console.log('📤 Creating payment order...');
                console.log('URL:', `${CONFIG.API}/create-payment-order`);
                console.log('Payload:', payload);
                
                const res = await fetch(`${CONFIG.API}/create-payment-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                
                console.log('📥 Response status:', res.status);
                const data = await res.json();
                console.log('📥 Response data:', data);
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to create payment order');
                }
                
                paymentData = data.data;
                
                if (!paymentData || !paymentData.key_id) {
                    throw new Error('Payment configuration error');
                }
                
                renderCheckout();
                
            } catch (error) {
                console.error('❌ Error loading payment:', error);
                showError(error.message);
            }
        }
        
        // ============================================================
        // RENDER CHECKOUT UI
        // ============================================================
        function renderCheckout() {
            const advance = paymentData.advance;
            const total = paymentData.total;
            
            let itemsHtml = '';
            
            if (isCartCheckout && cartItems.length > 0) {
                itemsHtml = cartItems.map(item => `
                    <div class="order-item">
                        <span>${escapeHtml(item.title)}</span>
                        <span>₹${item.price}</span>
                    </div>
                `).join('');
            } else {
                itemsHtml = `
                    <div class="order-item">
                        <span>${escapeHtml(serviceTitle)}</span>
                        <span>₹${total}</span>
                    </div>
                `;
            }
            
            // 🔥 Show customization summary for custom orders
            let customizationHtml = '';
            if (isCustomOrder && customizationData) {
                const customFields = customizationData.customization || {};
                const customEntries = Object.entries(customFields).filter(([key, val]) => val && val !== '');
                
                if (customEntries.length > 0) {
                    customizationHtml = `
                        <div class="customization-badge">
                            <i class="fas fa-sliders-h"></i> <strong>Customization:</strong>
                            ${customEntries.slice(0, 3).map(([key, val]) => 
                                `<div style="font-size:0.8rem; margin-top:0.3rem;">• ${escapeHtml(key)}: ${escapeHtml(String(val).substring(0, 50))}</div>`
                            ).join('')}
                            ${customEntries.length > 3 ? `<div style="font-size:0.75rem; margin-top:0.3rem;">+${customEntries.length - 3} more options</div>` : ''}
                        </div>
                    `;
                }
            }
            
            const html = `
                <div class="order-summary">
                    <h3><i class="fas fa-shopping-bag"></i> Order Summary</h3>
                    ${itemsHtml}
                    ${customizationHtml}
                    <div class="total-row">
                        <span>Total Amount</span>
                        <span>₹${total}</span>
                    </div>
                </div>
                
                <div class="advance-card">
                    <div class="advance-label">Pay 15% Advance</div>
                    <div class="advance-amount">₹${advance}</div>
                    <div style="font-size: 0.8rem;">Remaining 85% after delivery</div>
                </div>
                
                <div class="refund-note">
                    <i class="fas fa-shield-alt"></i>
                    <span>100% refund within 24 hours (minus 2% gateway fee).</span>
                </div>
                
                <div class="payment-methods">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fas fa-mobile-alt"></i>
                    <i class="fab fa-google-pay"></i>
                    <i class="fab fa-apple-pay"></i>
                </div>
                
                <button class="btn-pay" id="pay-button">
                    <i class="fas fa-lock"></i> Pay ₹${advance} Now
                </button>
                <button class="btn-back" onclick="window.location.href='${isCartCheckout ? 'cart.html' : (isCustomOrder ? `order-customize.html?id=${serviceId}` : 'services.html')}'">
                    ← Back
                </button>
            `;
            
            document.getElementById('checkout-content').innerHTML = html;
            document.getElementById('pay-button').addEventListener('click', initPayment);
        }
        
        // ============================================================
        // INITIATE PAYMENT
        // ============================================================
        function initPayment() {
            // Check authentication again before payment
            if (!checkAuth()) {
                return;
            }
            
            const token = Auth.getToken();
            if (!token) {
                showError('Please login to continue');
                window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
                return;
            }
            
            const user = Auth.getUser() || {};
            const advance = paymentData.advance;
            
            // Store pending payment
            localStorage.setItem('pending_payment', JSON.stringify({
                order_id: paymentData.razorpay_order_id,
                amount: advance,
                timestamp: new Date().toISOString(),
                attempt: ++paymentAttemptCount,
                is_custom: isCustomOrder,
                customization: customizationData
            }));
            
            const options = {
                key: paymentData.key_id,
                amount: Math.round(advance * 100),
                currency: "INR",
                name: "NovaStack",
                description: `15% Advance for ${isCustomOrder ? 'Custom Order' : (isCartCheckout ? 'Cart Items' : serviceTitle)}`,
                order_id: paymentData.razorpay_order_id,
                handler: function(response) {
                    console.log('💰 Payment Response:', response);
                    localStorage.removeItem('pending_payment');
                    verifyPayment(response);
                },
                modal: {
                    ondismiss: function() {
                        console.log('Payment modal closed by user');
                        const btn = document.getElementById('pay-button');
                        if (btn) {
                            btn.disabled = false;
                            btn.innerHTML = `<i class="fas fa-lock"></i> Pay ₹${advance} Now`;
                        }
                        document.getElementById('manualConfirm').classList.add('show');
                        showToast('Payment cancelled. You can try again.', 'warning');
                    }
                },
                prefill: {
                    name: user.name || '',
                    email: user.email || '',
                    contact: ''
                },
                theme: {
                    color: "#ff6b35"
                }
            };
            
            const rzp = new Razorpay(options);
            
            rzp.on('payment.failed', function(response) {
                console.error('❌ Payment Failed:', response.error);
                const errorMessage = response.error.description || response.error.reason || 'Payment failed';
                
                // Log failure to backend
                fetch(`${CONFIG.API}/payment-failed`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${Auth.getToken()}`
                    },
                    body: JSON.stringify({
                        razorpay_order_id: paymentData.razorpay_order_id,
                        error: response.error.code,
                        error_description: errorMessage,
                        user_id: Auth.getUser()?.id
                    })
                }).catch(e => console.error('Failed to log error:', e));
                
                showToast('Payment failed: ' + errorMessage, 'error');
                
                const btn = document.getElementById('pay-button');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-lock"></i> Pay ₹${advance} Now`;
                }
                localStorage.removeItem('pending_payment');
            });
            
            const btn = document.getElementById('pay-button');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening payment...';
            }
            
            rzp.open();
        }
        
        // ============================================================
        // VERIFY PAYMENT - WITH CUSTOM ORDER HANDLING
        // ============================================================
        async function verifyPayment(response) {
            console.log('💰 Starting payment verification...');
            console.log('📦 Payment response:', response);
            
            // Get token
            const token = Auth.getToken();
            console.log('🔑 Token for verification:', token ? `Present (${token.substring(0, 20)}...)` : 'MISSING');
            
            if (!token) {
                console.error('❌ No token found for verification');
                showToast('Session expired. Please login again.', 'error');
                
                // Store payment info for recovery
                localStorage.setItem('pending_payment_recovery', JSON.stringify({
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_signature: response.razorpay_signature,
                    timestamp: new Date().toISOString(),
                    is_custom: isCustomOrder
                }));
                
                setTimeout(() => {
                    window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
                }, 2000);
                return;
            }
            
            const btn = document.getElementById('pay-button');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying payment...';
            }
            
            try {
                console.log('📤 Sending verification to backend...');
                console.log('URL:', `${CONFIG.API}/verify-payment`);
                
                const res = await fetch(`${CONFIG.API}/verify-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_signature: response.razorpay_signature
                    })
                });
                
                console.log('📥 Verification response status:', res.status);
                const data = await res.json();
                console.log('📥 Verification response data:', data);
                
                if (!res.ok) {
                    throw new Error(data.error || 'Verification failed');
                }
                
                // 🔥 SUCCESS! Now handle custom order data
                console.log('✅ Payment verified successfully!');
                
                const orderData = data.data;
                
                // 🔥 If this was a custom order, save customization data to the order
                if (isCustomOrder && customizationData) {
                    console.log('🎨 Saving customization data for order...');
                    
                    // 🔥 CRITICAL: Pehle check karo agar order already exist karta hai?
                    try {
                        // Check if order already exists for this service
                        const checkRes = await fetch(`${CONFIG.API}/my-orders`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const ordersData = await checkRes.json();
                        
                        const existingOrder = ordersData.orders?.find(o => 
                            o.service_id === parseInt(serviceId) && 
                            (o.status === 'payment_received' || o.status === 'in_progress')
                        );
                        
                        if (existingOrder) {
                            console.log(`✅ Order already exists: ${existingOrder.id}, skipping creation`);
                            orderData.order_id = existingOrder.id;
                        } else {
                            // Create new order
                            const customRes = await fetch(`${CONFIG.API}/order/customize`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    service_id: parseInt(serviceId),
                                    customization: customizationData.customization,
                                    requirements: customizationData.requirements,
                                    timeline: customizationData.timeline,
                                    references: customizationData.references
                                })
                            });
                            
                            const customResult = await customRes.json();
                            console.log('📝 Customization save result:', customResult);
                            
                            if (customRes.ok && customResult.data) {
                                console.log('✅ Customization saved to order!');
                                if (customResult.data.order_id) {
                                    orderData.order_id = customResult.data.order_id;
                                }
                            } else {
                                console.warn('⚠️ Customization save warning:', customResult.error);
                            }
                        }
                        
                    } catch (customError) {
                        console.error('❌ Error checking/saving customization:', customError);
                        showToast('Order created! Customization will be applied.', 'warning');
                    }
                    
                    // Clear stored customization from both keys
                    localStorage.removeItem('pending_customization');
                    localStorage.removeItem('pending_order_data');  // 🔥 ADD THIS LINE
                }
                
                // Clear cart if it was a cart checkout
                if (isCartCheckout) {
                    localStorage.removeItem('dc_cart_local');
                }
                
                localStorage.removeItem('pending_payment');
                localStorage.removeItem('pending_payment_recovery');
                
                localStorage.setItem('dc_last_order', JSON.stringify({
                    order_id: orderData.order_id,
                    advance_paid: orderData.advance_paid,
                    total: orderData.total,
                    balance_due: orderData.balance_due,
                    is_custom: isCustomOrder
                }));
                
                showToast('✅ Payment successful! Order confirmed.');
                
                setTimeout(() => {
                    window.location.href = `order-confirmed.html?order_id=${orderData.order_id}`;
                }, 1500);
                
            } catch (error) {
                console.error('❌ Verification error:', error);
                console.error('Error details:', error.message);
                
                // Show manual confirmation button
                showToast('⚠️ Payment successful but verification pending. Click "Confirm Order" to complete.', 'warning');
                
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-lock"></i> Pay ₹${paymentData?.advance || 0} Now`;
                }
                
                // Store payment info for manual confirmation
                localStorage.setItem('pending_payment_recovery', JSON.stringify({
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_signature: response.razorpay_signature,
                    timestamp: new Date().toISOString(),
                    is_custom: isCustomOrder,
                    customization: customizationData
                }));
                
                // Show manual confirmation button
                document.getElementById('manualConfirm').classList.add('show');
                
                // Update payment status box
                const paymentStatus = document.getElementById('paymentStatus');
                if (paymentStatus) {
                    paymentStatus.innerHTML = `
                        <div class="payment-status success">
                            <i class="fas fa-check-circle" style="color: #10b981; font-size: 2rem;"></i>
                            <p><strong>Payment Received!</strong></p>
                            <p>Your payment of ₹${paymentData?.advance || 0} was successful.</p>
                            <p>Click below to confirm your order.</p>
                            <button class="btn-manual" onclick="manualConfirm()" style="margin-top: 0.5rem;">
                                <i class="fas fa-check"></i> Confirm Order
                            </button>
                        </div>
                    `;
                }
            }
        }
        
        // ============================================================
        // MANUAL CONFIRMATION - WITH CUSTOM ORDER HANDLING
        // ============================================================
        async function manualConfirm() {
            console.log('🔧 Manual confirmation triggered');
            
            const token = Auth.getToken();
            if (!token) {
                showToast('Please login to confirm order', 'error');
                window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
                return;
            }
            
            const pendingPayment = localStorage.getItem('pending_payment_recovery') || localStorage.getItem('pending_payment');
            
            if (!pendingPayment) {
                showToast('No pending payment found.', 'error');
                window.location.reload();
                return;
            }
            
            const payment = JSON.parse(pendingPayment);
            console.log('📦 Manual confirmation for order:', payment.razorpay_order_id);
            
            const statusDiv = document.getElementById('paymentStatus');
            if (statusDiv) {
                statusDiv.innerHTML = `
                    <div class="payment-status pending">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Checking payment status...</p>
                    </div>
                `;
            }
            
            try {
                // Try to verify again
                const res = await fetch(`${CONFIG.API}/verify-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        razorpay_order_id: payment.razorpay_order_id,
                        razorpay_payment_id: payment.razorpay_payment_id,
                        razorpay_signature: payment.razorpay_signature
                    })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    // 🔥 Success! Handle custom order if needed
                    if (payment.is_custom && payment.customization) {
                        try {
                            await fetch(`${CONFIG.API}/order/customize`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    service_id: parseInt(serviceId),
                                    customization: payment.customization.customization,
                                    requirements: payment.customization.requirements,
                                    timeline: payment.customization.timeline,
                                    references: payment.customization.references
                                })
                            });
                            console.log('✅ Customization saved during manual confirm');
                        } catch(e) {
                            console.error('Error saving customization:', e);
                        }
                        localStorage.removeItem('pending_customization');
                    }
                    
                    localStorage.removeItem('pending_payment');
                    localStorage.removeItem('pending_payment_recovery');
                    
                    if (isCartCheckout) {
                        localStorage.removeItem('dc_cart_local');
                    }
                    
                    showToast('✅ Order confirmed successfully!');
                    setTimeout(() => {
                        window.location.href = `order-confirmed.html?order_id=${data.data?.order_id || payment.razorpay_order_id}`;
                    }, 1500);
                } else {
                    // Try check status endpoint
                    const checkRes = await fetch(`${CONFIG.API}/check-payment-status`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            razorpay_order_id: payment.razorpay_order_id
                        })
                    });
                    
                    const checkData = await checkRes.json();
                    
                    if (checkData.success && checkData.paid) {
                        showToast('✅ Payment confirmed! Order will be created.');
                        setTimeout(() => {
                            window.location.reload();
                        }, 1500);
                    } else {
                        statusDiv.innerHTML = `
                            <div class="payment-status pending">
                                <i class="fas fa-hourglass-half"></i>
                                <p>Payment still processing. Please wait a moment.</p>
                                <button class="btn-manual" onclick="manualConfirm()">
                                    <i class="fas fa-sync"></i> Check Again
                                </button>
                                <button class="btn-back" onclick="window.location.href='${isCartCheckout ? 'cart.html' : 'services.html'}'">
                                    ← Go to Services
                                </button>
                            </div>
                        `;
                        showToast('Payment still processing. Please wait and try again.', 'warning');
                    }
                }
            } catch (error) {
                console.error('❌ Manual confirmation error:', error);
                statusDiv.innerHTML = `
                    <div class="payment-status pending">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Could not verify payment status.</p>
                        <p style="font-size: 0.85rem;">Your payment was successful. Our team will confirm your order shortly.</p>
                        <button class="btn-manual" onclick="manualConfirm()">
                            <i class="fas fa-sync"></i> Try Again
                        </button>
                        <button class="btn-back" onclick="window.location.href='${isCartCheckout ? 'cart.html' : 'services.html'}'">
                            ← Go to Services
                        </button>
                    </div>
                `;
            }
        }
        
        // ============================================================
        // RETRY PAYMENT
        // ============================================================
        async function retryPayment() {
            const token = Auth.getToken();
            if (!token) {
                window.location.href = `login.html?redirect=checkout.html${window.location.search}`;
                return;
            }
            
            showToast('Retrying payment...', 'warning');
            
            try {
                let payload = {
                    service_id: parseInt(serviceId) || 0,
                    service_title: serviceTitle,
                    total_price: totalPrice,
                    quantity: isCartCheckout ? cartItems.length : 1
                };
                
                if (isCustomOrder && customizationData) {
                    payload.customization = customizationData.customization;
                    payload.requirements = customizationData.requirements;
                }
                
                const res = await fetch(`${CONFIG.API}/create-payment-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to create payment order');
                }
                
                paymentData = data.data;
                renderCheckout();
                setTimeout(() => initPayment(), 500);
                
            } catch (error) {
                console.error('❌ Retry error:', error);
                showToast('Failed to retry: ' + error.message, 'error');
            }
        }
        
        // ============================================================
        // START
        // ============================================================
        console.log('🚀 Starting checkout page...');
        console.log('📦 Custom order mode:', isCustomOrder);
        loadPayment();
    </script>
</body>
