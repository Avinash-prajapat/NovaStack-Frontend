<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- 🔧 Enhanced viewport for all mobile devices including Samsung Galaxy -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f0c1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Service Details — NovaStack</title>
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    /* ===== 🎨 CSS Variables (Enhanced) ===== */
    :root {
      --bg-primary: #0f0c1a;
      --bg-secondary: #1a162a;
      --bg-card: rgba(26, 22, 42, 0.9);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-hover: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.12);
      --border-hover: rgba(232, 93, 38, 0.6);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.4);
      --accent-secondary: #7c3aed;
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.35);
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.3);
      --error: #ef4444;
      --gradient-accent: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --gradient-2: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-3: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --gradient-ecom: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      --gradient-default: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 40px var(--accent-glow);
      --shadow-success: 0 0 40px var(--green-glow);
      --transition-fast: 150ms ease;
      --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;
      /* Safe area insets for notched devices */
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }

    /* ===== 🌟 Base Reset ===== */
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    html { 
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      min-height: -webkit-fill-available; /* iOS fix */
      position: relative;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      overscroll-behavior-y: contain; /* Prevent pull-to-refresh bounce */
    }

    /* Prevent text selection on interactive elements */
    .btn, .nav-link, .project-links a, .related-card {
      -webkit-user-select: none;
      user-select: none;
    }
    
    /* Allow text selection in content */
    .project-desc, .feature-item, .tech-tag {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 15% 85%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 15%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
      z-index: -2;
      animation: bgPulse 25s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes bgPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.03); }
    }

    /* Floating Particles - Reduced on mobile for performance */
    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      opacity: 0.25;
      animation: float 18s infinite linear;
      will-change: transform, opacity;
    }
    
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.25; }
      90% { opacity: 0.25; }
      100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
    }

    /* ===== 🔗 Navigation ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(15, 12, 26, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: calc(72px + var(--safe-top));
      transition: all var(--transition-normal);
    }
    
    nav.scrolled {
      height: calc(64px + var(--safe-top));
      background: rgba(15, 12, 26, 0.98);
      box-shadow: var(--shadow-md);
    }
    
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.3rem, 4vw, 1.5rem);
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: transform var(--transition-fast);
      flex-shrink: 0;
    }
    
    .logo:hover { transform: scale(1.05); }
    .logo span {
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-right {
      display: flex;
      gap: clamp(0.5rem, 2vw, 0.7rem);
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* ===== ✨ Modern Buttons - Touch Optimized ===== */
    .btn {
      padding: clamp(0.5rem, 2vw, 0.55rem) clamp(0.8rem, 3vw, 1.2rem);
      border-radius: var(--radius-full);
      font-size: clamp(0.8rem, 2.5vw, 0.85rem);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      border: none;
      position: relative;
      overflow: hidden;
      min-height: 44px; /* Touch target */
      min-width: 44px;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
      pointer-events: none;
    }
    
    .btn:hover::before { left: 100%; }
    
    .btn-sm {
      padding: clamp(0.4rem, 2vw, 0.45rem) clamp(0.7rem, 2.5vw, 1rem);
      font-size: clamp(0.75rem, 2.3vw, 0.82rem);
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      transition: all var(--transition-normal);
      min-height: 40px;
      white-space: nowrap;
    }
    
    .btn-sm:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    
    .btn-sm:active {
      transform: translateY(0);
    }
    
    .btn-accent {
      background: var(--gradient-accent);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    
    .btn-accent:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    
    .btn-accent:active {
      transform: translateY(0);
    }

    /* Cart Badge */
    .cart-btn { position: relative; }
    .cart-count {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--gradient-accent);
      color: white;
      border-radius: var(--radius-full);
      width: 20px; height: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
      box-shadow: 0 0 10px var(--accent-glow);
      flex-shrink: 0;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* ===== 🥖 Breadcrumb ===== */
    .breadcrumb {
      padding: 1rem 5%;
      padding-top: calc(1rem + var(--safe-top));
      max-width: 1400px;
      margin: 0 auto;
      font-size: clamp(0.8rem, 2.5vw, 0.85rem);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      animation: slideInDown 0.4s ease-out;
    }
    
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .breadcrumb a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }
    
    .breadcrumb a:hover { 
      color: var(--accent); 
      background: var(--surface);
    }
    
    .breadcrumb a i { font-size: 0.7rem; }
    .breadcrumb span { color: var(--border); }
    .breadcrumb .current { 
      color: var(--text-primary); 
      font-weight: 500;
      padding: 4px 8px;
      background: var(--surface);
      border-radius: var(--radius-sm);
    }

    /* ===== 📐 Main Layout ===== */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 5% 4rem;
      padding-top: calc(1rem + var(--safe-top));
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      align-items: start;
    }
    
    @media (min-width: 1100px) {
      .layout {
        grid-template-columns: 1fr 360px;
        gap: 2.5rem;
      }
    }

    /* ===== 🖼️ Project Hero Thumbnail ===== */
    .project-hero {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      height: clamp(220px, 35vw, 320px);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(3rem, 12vw, 5.5rem);
      animation: fadeIn 0.6s ease-out;
      box-shadow: var(--shadow-lg);
      contain: content;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .project-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.6));
      z-index: 1;
      pointer-events: none;
    }
    
    .project-hero::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: var(--gradient-accent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
      animation: borderGlow 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes borderGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    
    .thumb-web { background: var(--gradient-1); }
    .thumb-mobile { background: var(--gradient-1); }
    .thumb-ai { background: var(--gradient-2); }
    .thumb-portfolio { background: var(--gradient-3); }
    .thumb-ecom { background: var(--gradient-ecom); }
    .thumb-custom { background: var(--gradient-default); }
    
    .cat-badge {
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      background: rgba(15, 12, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: clamp(0.3rem, 1.5vw, 0.35rem) clamp(0.7rem, 2.5vw, 1rem);
      font-size: clamp(0.72rem, 2.3vw, 0.78rem);
      font-weight: 600;
      text-transform: capitalize;
      color: var(--text-primary);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: slideInLeft 0.5s ease-out 0.2s both;
      max-width: calc(100% - 2.4rem);
    }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .project-hero .emoji {
      position: relative;
      z-index: 2;
      animation: floatIcon 4s ease-in-out infinite;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
    }
    
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ===== 📝 Content Section ===== */
    .content-section {
      animation: slideUp 0.5s ease-out 0.3s both;
      opacity: 0;
      will-change: opacity, transform;
    }
    
    .content-section.visible { opacity: 1; }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .project-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      margin-bottom: 0.8rem;
      line-height: 1.2;
      word-break: break-word;
    }
    
    .project-title span {
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .project-meta {
      display: flex;
      align-items: center;
      gap: clamp(0.6rem, 2vw, 1rem);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: clamp(0.8rem, 2.3vw, 0.85rem);
      color: var(--text-muted);
      padding: 4px 8px;
      background: var(--surface);
      border-radius: var(--radius-sm);
    }
    
    .meta-item i { color: var(--accent); }
    
    .project-desc {
      color: var(--text-secondary);
      font-size: clamp(0.95rem, 2.8vw, 1rem);
      line-height: 1.8;
      margin-bottom: 2.2rem;
    }
    
    .project-desc p { margin-bottom: 1rem; }
    .project-desc p:last-child { margin-bottom: 0; }
    .project-desc p { word-break: break-word; }

    /* ===== 🏷️ Section Labels ===== */
    .section-lbl {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(0.75rem, 2.2vw, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin: 2rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    
    .section-lbl i { color: var(--accent); font-size: 0.9rem; }

    /* ===== 🔧 Technology Tags ===== */
    .tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(0.4rem, 1.5vw, 0.5rem);
      margin-bottom: 1.8rem;
    }
    
    .tech-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: clamp(0.3rem, 1.5vw, 0.35rem) clamp(0.7rem, 2.5vw, 0.9rem);
      font-size: clamp(0.78rem, 2.3vw, 0.82rem);
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-height: 36px;
    }
    
    .tech-tag:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    
    .tech-tag:active {
      transform: translateY(0);
    }
    
    .tech-tag i { font-size: 0.75rem; color: var(--accent); }

    /* ===== ✅ Features Grid ===== */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: clamp(0.5rem, 2vw, 0.7rem);
      margin-bottom: 2rem;
    }
    
    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: clamp(0.85rem, 2.5vw, 0.9rem);
      color: var(--text-secondary);
      padding: 0.5rem;
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
      min-height: 44px;
    }
    
    .feature-item:hover { background: var(--surface); }
    
    .feature-item::before {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: var(--green);
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 3px;
      animation: checkPop 0.3s ease-out;
    }
    
    @keyframes checkPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ===== 🔗 Project Links ===== */
    .project-links {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    
    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: clamp(0.55rem, 2vw, 0.6rem) clamp(0.9rem, 3vw, 1.2rem);
      border-radius: var(--radius-md);
      font-size: clamp(0.8rem, 2.3vw, 0.85rem);
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition-normal);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      min-height: 44px;
      min-width: 44px;
      flex: 1;
      max-width: 100%;
    }
    
    .link-btn i { font-size: 0.9rem; flex-shrink: 0; }
    
    .link-github {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .link-github:hover {
      background: #fff;
      color: #1a1714;
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
    }
    
    .link-demo {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
      color: var(--blue);
    }
    
    .link-demo:hover {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--blue-glow);
    }
    
    .link-btn:active {
      transform: translateY(0);
    }
    
    .link-na {
      background: var(--surface);
      color: var(--text-muted);
      border-style: dashed;
      cursor: not-allowed;
      opacity: 0.7;
      pointer-events: none;
    }

    /* ===== 🔗 Related Services ===== */
    .related-section {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      animation: slideUp 0.5s ease-out 0.5s both;
      opacity: 0;
    }
    
    .related-section.visible { opacity: 1; }
    
    .related-section h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 3.5vw, 1.2rem);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      word-break: break-word;
    }
    
    .related-section h3 i { color: var(--accent); }
    
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    
    .related-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none;
      color: var(--text-primary);
      transition: all var(--transition-normal);
      display: block;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      contain: content;
    }
    
    .related-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: var(--shadow-md), 0 0 30px var(--accent-glow);
    }
    
    .related-card:active {
      transform: translateY(0);
    }
    
    .related-thumb {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 6vw, 2.3rem);
      position: relative;
      overflow: hidden;
    }
    
    .related-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.4));
      pointer-events: none;
    }
    
    .related-body {
      padding: 1rem;
    }
    
    .related-body h4 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(0.85rem, 2.8vw, 0.9rem);
      margin-bottom: 0.3rem;
      line-height: 1.3;
      transition: color var(--transition-fast);
      word-break: break-word;
    }
    
    .related-card:hover .related-body h4 { color: var(--accent); }
    
    .related-body span {
      font-size: clamp(0.78rem, 2.3vw, 0.82rem);
      color: var(--accent);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* ===== 🛒 Order Card (Sticky Sidebar) ===== */
    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(1.2rem, 4vw, 1.8rem);
      position: sticky;
      top: calc(80px + var(--safe-top));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      border-top: 3px solid var(--gradient-accent);
      animation: slideInRight 0.5s ease-out 0.4s both;
      opacity: 0;
      z-index: 10;
    }
    
    @media (max-width: 1099px) {
      .order-card {
        position: static;
        order: -1;
        top: auto;
      }
    }
    
    .order-card.visible { opacity: 1; }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .order-price {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 6vw, 2.3rem);
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
      line-height: 1.1;
    }
    
    .order-price-note {
      font-size: clamp(0.8rem, 2.3vw, 0.85rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    
    .order-details {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.3rem;
      border-bottom: 1px solid var(--border);
    }
    
    .order-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: clamp(0.85rem, 2.5vw, 0.9rem);
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    
    .order-row:hover { background: var(--surface); }
    
    .order-row .lbl {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }
    
    .order-row .lbl i { color: var(--accent); font-size: 0.85rem; flex-shrink: 0; }
    .order-row .val { 
      font-weight: 600; 
      color: var(--text-primary);
      text-align: right;
      flex-shrink: 0;
    }
    
    .btn-add-cart {
      width: 100%;
      padding: clamp(0.85rem, 3vw, 1rem);
      background: var(--gradient-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(0.9rem, 2.8vw, 0.95rem);
      cursor: pointer;
      transition: all var(--transition-normal);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
      box-shadow: var(--shadow-glow);
      position: relative;
      overflow: hidden;
      min-height: 48px;
    }
    
    .btn-add-cart::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
      pointer-events: none;
    }
    
    .btn-add-cart:hover:not(:disabled)::before { left: 100%; }
    .btn-add-cart:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 45px var(--accent-glow);
    }
    
    .btn-add-cart:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn-add-cart.in-cart {
      background: var(--gradient-success);
      box-shadow: var(--shadow-success);
    }
    
    .btn-add-cart.in-cart:hover {
      box-shadow: 0 12px 45px var(--green-glow);
    }
    
    .btn-contact {
      width: 100%;
      padding: clamp(0.75rem, 2.8vw, 0.85rem);
      background: var(--surface);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: clamp(0.85rem, 2.5vw, 0.9rem);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-normal);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
      min-height: 44px;
    }
    
    .btn-contact:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    
    .btn-contact:active {
      transform: translateY(0);
    }
    
    .guarantee {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 1rem;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: var(--radius-md);
      margin-top: 1.2rem;
      animation: fadeIn 0.5s ease-out 0.6s both;
      opacity: 0;
    }
    
    .guarantee.visible { opacity: 1; }
    
    .guarantee i {
      font-size: 1.3rem;
      color: var(--green);
      flex-shrink: 0;
      margin-top: 2px;
      animation: pulse 2s infinite;
    }
    
    .guarantee p {
      font-size: clamp(0.8rem, 2.3vw, 0.85rem);
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
      word-break: break-word;
    }

    /* ===== ⚠️ Error State ===== */
    .error-state {
      text-align: center;
      padding: clamp(4rem, 15vw, 6rem) 2rem;
      animation: fadeIn 0.5s ease-out;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .error-state .icon {
      font-size: clamp(3rem, 10vw, 4rem);
      display: block;
      margin-bottom: 1.2rem;
      color: var(--error);
      animation: shake 0.5s ease-in-out;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    
    .error-state h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.3rem, 4vw, 1.5rem);
      margin-bottom: 0.6rem;
    }
    
    .error-state p {
      color: var(--text-muted);
      margin-bottom: 1.8rem;
      font-size: clamp(0.9rem, 2.8vw, 0.95rem);
    }

    /* ===== 🌀 Loading Spinner ===== */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 5rem auto;
      flex-shrink: 0;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 🍞 Toast Notification ===== */
    #toast {
      position: fixed;
      bottom: calc(2rem + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: clamp(0.75rem, 2.5vw, 0.85rem) clamp(1.2rem, 4vw, 1.8rem);
      border-radius: var(--radius-full);
      font-size: clamp(0.85rem, 2.5vw, 0.9rem);
      font-weight: 500;
      z-index: 9999;
      transition: transform var(--transition-normal);
      white-space: nowrap;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-family: 'DM Sans', sans-serif;
      max-width: 90vw;
      text-align: center;
      pointer-events: none;
    }
    
    #toast.success { background: linear-gradient(135deg, var(--green), #059669); }
    #toast.error { background: linear-gradient(135deg, var(--error), #b91c1c); }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== 📱 Responsive Design - Mobile First ===== */
    @media (max-width: 768px) {
      nav { 
        padding: 0 4%; 
        height: calc(68px + var(--safe-top));
      }
      
      .nav-right { 
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      
      .btn-sm { 
        padding: 0.35rem 0.7rem; 
        font-size: 0.75rem;
        min-height: 36px;
      }
      
      .breadcrumb {
        padding: 0.8rem 4%;
        padding-top: calc(0.8rem + var(--safe-top));
        font-size: 0.8rem;
      }
      
      .layout { 
        padding: 0.8rem 4% 3rem;
        padding-top: calc(0.8rem + var(--safe-top));
      }
      
      .project-hero { 
        height: clamp(200px, 40vw, 260px); 
        font-size: clamp(2.8rem, 14vw, 4.5rem);
        margin-bottom: 1.5rem;
      }
      
      .project-title { 
        font-size: clamp(1.5rem, 5.5vw, 1.8rem);
        margin-bottom: 0.6rem;
      }
      
      .project-meta {
        gap: 0.5rem;
        margin-bottom: 1.2rem;
      }
      
      .meta-item {
        font-size: 0.8rem;
        padding: 3px 6px;
      }
      
      .features-grid { 
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      
      .project-links { 
        flex-direction: column;
        gap: 0.6rem;
      }
      
      .link-btn { 
        width: 100%; 
        justify-content: center;
        min-height: 48px;
      }
      
      .order-card { 
        padding: 1.2rem;
        margin-bottom: 1rem;
      }
      
      .order-price { 
        font-size: clamp(1.6rem, 6vw, 2rem);
      }
      
      .order-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.3rem;
      }
      
      .order-row .val {
        text-align: left;
        width: 100%;
      }
      
      .related-grid { 
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
      
      .related-thumb {
        height: 80px;
        font-size: 1.8rem;
      }
      
      .related-body h4 {
        font-size: 0.85rem;
      }
      
      .guarantee {
        padding: 0.8rem;
        gap: 0.5rem;
      }
      
      .guarantee p {
        font-size: 0.8rem;
      }
    }
    
    @media (max-width: 480px) {
      .project-hero { 
        height: clamp(180px, 45vw, 220px); 
        font-size: clamp(2.5rem, 16vw, 3.5rem);
      }
      
      .cat-badge { 
        padding: 0.25rem 0.7rem; 
        font-size: 0.7rem;
        left: 0.8rem;
        top: 0.8rem;
      }
      
      .tech-list { 
        gap: 0.35rem;
      }
      
      .tech-tag { 
        padding: 0.25rem 0.6rem; 
        font-size: 0.75rem;
        min-height: 32px;
      }
      
      .related-grid { 
        grid-template-columns: 1fr;
      }
      
      .btn-add-cart, 
      .btn-contact { 
        padding: 0.8rem; 
        font-size: 0.85rem;
        min-height: 44px;
      }
      
      .section-lbl {
        font-size: 0.75rem;
        margin: 1.5rem 0 0.8rem;
      }
    }

    /* ===== 🔄 Samsung/Android Specific Fixes ===== */
    @supports (-webkit-touch-callout: none) {
      /* iOS specific optimizations */
      .modal-content, .chat-messages, .order-card {
        -webkit-overflow-scrolling: touch;
      }
    }

    @media screen and (-webkit-min-device-pixel-ratio: 2), 
           screen and (min-resolution: 192dpi) {
      /* High-DPI screens - optimize rendering */
      .order-card, .related-card, .btn, .link-btn {
        will-change: transform;
        backface-visibility: hidden;
      }
    }

    /* ===== ♿ Accessibility ===== */
    a:focus, button:focus, .link-btn:focus, .btn-add-cart:focus, .btn-contact:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    
    /* Skip link for keyboard users */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--accent);
      color: white;
      padding: 0.5rem 1rem;
      z-index: 10000;
      transition: top 0.2s;
    }
    
    .skip-link:focus {
      top: 0;
    }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* ===== 🎨 Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb {
      background: var(--gradient-accent);
      border-radius: var(--radius-full);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>

<!-- Skip link for accessibility -->
<a href="#main-content" class="skip-link">Skip to content</a>

<!-- Animated Particles Background (reduced count on mobile) -->
<div class="particles" id="particles" aria-hidden="true"></div>

<!-- 🔗 Navigation -->
<nav id="navbar" role="navigation" aria-label="Main navigation">
  <a class="logo" href="index.html" aria-label="NovaStack Home">
    <i class="fas fa-code" aria-hidden="true"></i> Nova<span>Stack</span>
  </a>
  <div class="nav-right">
    <a href="cart.html" class="btn-sm cart-btn" aria-label="View cart">
      <i class="fas fa-shopping-cart" aria-hidden="true"></i> 
      <span class="cart-count" id="cart-count" aria-live="polite">0</span>
    </a>
    <a href="login.html" class="btn-sm" id="login-btn">Login</a>
    <a href="signup.html" class="btn-sm btn-accent" id="signup-btn">Sign Up</a>
    <span id="user-nav" style="display:none;font-size:0.83rem;color:var(--text-secondary)" aria-live="polite"></span>
    <button id="logout-btn" style="display:none;" class="btn-sm" onclick="logout()" aria-label="Logout">
      <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
    </button>
  </div>
</nav>

<!-- 🥖 Breadcrumb -->
<div class="breadcrumb" role="navigation" aria-label="Breadcrumb">
  <a href="index.html"><i class="fas fa-home" aria-hidden="true"></i> Home</a>
  <span aria-hidden="true"><i class="fas fa-chevron-right" style="font-size:0.65rem"></i></span>
  <a href="services.html"><i class="fas fa-layer-group" aria-hidden="true"></i> Services</a>
  <span aria-hidden="true"><i class="fas fa-chevron-right" style="font-size:0.65rem"></i></span>
  <span class="current" id="bc-title" aria-current="page">Loading...</span>
</div>

<!-- 📐 Main Content -->
<main id="main-content">
  <div id="page-body">
    <div style="text-align:center;padding:5rem">
      <div class="spinner" role="status" aria-label="Loading"></div>
      <p style="color:var(--text-muted);margin-top:1.2rem;font-size:0.95rem">Loading service details...</p>
    </div>
  </div>
</main>

<!-- 🍞 Toast Notification -->
<div id="toast" role="alert" aria-live="assertive" style="display:none"></div>

<script>
// ── 🔧 CONFIG - API Setup ─────────────────────────────────────────────────
const CONFIG = {
  // 🔁 Use mock mode for testing without backend
  USE_MOCK: false,
  
  API: 'https://novastack-backend.onrender.com',
  WA_NUMBER: '9015277062',
  
  ENDPOINTS: {
    SERVICE: '/api/service',
    SERVICES: '/api/services',
    CART_ADD: '/api/cart/add',
    CART_REMOVE: '/api/cart/remove'
  },
  
  // Mock data for testing
  MOCK_SERVICES: {
    'web-dev': {
      id: 'web-dev',
      title: 'Professional Web Development',
      category: 'web',
      emoji: '🌐',
      price: 15000,
      delivery_days: 14,
      revisions: 3,
      description: 'Get a stunning, responsive website built with modern technologies.\n\nWe specialize in React, Next.js, and Node.js to deliver fast, scalable web applications that look great on all devices.',
      technologies: 'React,Node.js,Next.js,Tailwind CSS,MongoDB',
      features: [
        'Responsive design for all devices',
        'SEO optimized structure',
        'Fast loading performance',
        'Secure authentication system',
        'Admin dashboard included'
      ],
      github_link: 'https://github.com/novastack/demo-web',
      live_url: 'https://demo.novastack.com/web'
    },
    'mobile-app': {
      id: 'mobile-app',
      title: 'Cross-Platform Mobile App',
      category: 'mobile',
      emoji: '📱',
      price: 25000,
      delivery_days: 21,
      revisions: 4,
      description: 'Native-quality mobile apps for iOS and Android using React Native or Flutter.\n\nFrom concept to app store submission, we handle the entire development lifecycle.',
      technologies: 'React Native,Flutter,Firebase,Redux,TypeScript',
      features: [
        'iOS & Android compatibility',
        'Push notifications',
        'Offline functionality',
        'App store optimization',
        'Post-launch support'
      ],
      github_link: '',
      live_url: ''
    }
  }
};

// Set WhatsApp button link
document.addEventListener('DOMContentLoaded', () => {
  const waBtn = document.getElementById('wa-btn');
  if (waBtn) {
    waBtn.href = `https://wa.me/${CONFIG.WA_NUMBER}`;
  }
});

// ── ✨ Create Floating Particles (Performance Optimized) ─────────────────
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  // Reduce particle count on mobile for better performance
  const isMobile = window.innerWidth < 768;
  const count = isMobile ? 15 : 30;
  
  for (let i = 0; i < count; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 18 + 's';
    particle.style.animationDuration = (18 + Math.random() * 12) + 's';
    particle.style.opacity = 0.15 + Math.random() * 0.3;
    container.appendChild(particle);
  }
}
createParticles();

// ── 🧭 Navbar Scroll Effect (Debounced) ─────────────────────────────────
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

const handleScroll = debounce(() => {
  const nav = document.getElementById('navbar');
  if (nav) {
    if (window.scrollY > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  }
}, 100);

window.addEventListener('scroll', handleScroll, { passive: true });

// ── 🔐 Auth & Cart Helpers ──────────────────────────────────────────────
const Auth = {
  getToken() { 
    return localStorage.getItem('dc_token') || sessionStorage.getItem('dc_token') || ''; 
  },
  getUser() {  
    try { 
      const user = localStorage.getItem('dc_user') || sessionStorage.getItem('dc_user');
      return user ? JSON.parse(user) : null; 
    } catch { return null; } 
  },
  isLoggedIn() { return !!this.getToken() && !!this.getUser(); },
};

const CartLocal = {
  key: 'dc_cart_local',
  get() { 
    try { 
      return JSON.parse(localStorage.getItem(this.key) || '[]'); 
    } catch { return []; } 
  },
  set(items) { 
    try {
      localStorage.setItem(this.key, JSON.stringify(items));
    } catch (e) {
      console.warn('Failed to save cart:', e);
    }
  },
  has(id) { return this.get().some(c => c.id === id); },
  add(item) { 
    const cart = this.get(); 
    if (!this.has(item.id)) { 
      cart.push(item); 
      this.set(cart); 
      return true;
    }
    return false;
  },
  remove(id) { 
    const cart = this.get().filter(c => c.id !== id);
    this.set(cart);
    return true;
  },
  count() { return this.get().length; }
};

function logout() { 
  localStorage.removeItem('dc_token'); 
  localStorage.removeItem('dc_user'); 
  localStorage.removeItem(CartLocal.key);
  sessionStorage.removeItem('dc_token');
  sessionStorage.removeItem('dc_user');
  window.location.href = 'index.html';
}

function renderNav() {
  const cartCount = document.getElementById('cart-count');
  if (cartCount) {
    cartCount.textContent = CartLocal.count();
  }
  
  const user = Auth.getUser();
  const loginBtn = document.getElementById('login-btn');
  const signupBtn = document.getElementById('signup-btn');
  const userNav = document.getElementById('user-nav');
  const logoutBtn = document.getElementById('logout-btn');
  
  if (user && Auth.isLoggedIn()) {
    if (loginBtn) loginBtn.style.display = 'none';
    if (signupBtn) signupBtn.style.display = 'none';
    if (userNav) {
      userNav.style.display = 'inline';
      const name = user.name || user.email?.split('@')[0] || 'User';
      userNav.textContent = `👤 ${name.length > 12 ? name.substring(0, 10) + '...' : name}`;
      userNav.title = user.email || '';
    }
    if (logoutBtn) logoutBtn.style.display = 'inline-flex';
  } else {
    if (loginBtn) loginBtn.style.display = 'inline-flex';
    if (signupBtn) signupBtn.style.display = 'inline-flex';
    if (userNav) userNav.style.display = 'none';
    if (logoutBtn) logoutBtn.style.display = 'none';
  }
}

// ── 🌐 API Fetch with Mock Support & Retry Logic ────────────────────────
async function apiFetch(path, opts = {}) {
  // Mock mode for development/testing
  if (CONFIG.USE_MOCK) {
    await new Promise(resolve => setTimeout(resolve, 600)); // Simulate network delay
    
    if (path.includes('/service/')) {
      const id = path.split('/').pop();
      const service = CONFIG.MOCK_SERVICES[id];
      if (!service) throw new Error('Service not found');
      return { service };
    }
    
    if (path.includes('/services')) {
      return { services: Object.values(CONFIG.MOCK_SERVICES) };
    }
    
    if (path.includes('/cart/')) {
      return { success: true };
    }
    
    return {};
  }
  
  // Real API call with retry logic
  const headers = { 
    'Content-Type': 'application/json', 
    ...(opts.headers || {}) 
  };
  
  const token = Auth.getToken();
  if (token) {
    headers['Authorization'] = `Bearer ${token}`;
  }
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout
  
  let lastError;
  
  // Retry up to 2 times on network errors
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const res = await fetch(CONFIG.API + path, { 
        ...opts, 
        headers,
        credentials: 'include',
        signal: controller.signal
      });
      
      clearTimeout(timeoutId);
      
      const contentType = res.headers.get('content-type');
      const json = contentType?.includes('application/json') 
        ? await res.json() 
        : { error: 'Invalid response format' };
      
      if (!res.ok) {
        throw new Error(json.error || json.message || `HTTP ${res.status}`);
      }
      
      return json;
      
    } catch (error) {
      clearTimeout(timeoutId);
      lastError = error;
      
      if (error.name === 'AbortError') {
        throw new Error('Request timeout. Please check your connection.');
      }
      
      if (error.message.includes('Failed to fetch')) {
        if (attempt < 2) {
          // Wait before retrying
          await new Promise(resolve => setTimeout(resolve, 1000 * (attempt + 1)));
          continue;
        }
        throw new Error('Cannot connect to server. Please check your internet connection.');
      }
      
      throw error;
    }
  }
  
  throw lastError;
}

// ── 🍞 Toast Notification (Enhanced) ────────────────────────────────────
function showToast(msg, type = 'default') {
  let toast = document.getElementById('toast');
  
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.setAttribute('role', 'alert');
    toast.setAttribute('aria-live', 'assertive');
    toast.style.cssText = `
      position:fixed;bottom:calc(2rem + var(--safe-bottom));left:50%;
      transform:translateX(-50%) translateY(100px);
      padding:0.85rem 1.8rem;border-radius:9999px;font-size:0.9rem;font-weight:500;
      z-index:9999;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space:nowrap;color:#fff;display:flex;align-items:center;gap:0.6rem;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);backdrop-filter:blur(10px);
      font-family:'DM Sans',sans-serif;max-width:90vw;text-align:center;
      pointer-events:none;
    `;
    document.body.appendChild(toast);
  }
  
  toast.className = type;
  toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}" aria-hidden="true"></i> ${msg}`;
  toast.style.display = 'flex';
  
  // Trigger animation
  requestAnimationFrame(() => toast.classList.add('show'));
  
  // Clear existing timeout
  if (toast._t) clearTimeout(toast._t);
  
  toast._t = setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => { toast.style.display = 'none'; }, 300);
  }, 3000);
}

// ── 📝 Format Description with Paragraphs ──────────────────────────────
function formatDescription(text) {
  if (!text) return '<p>No description available.</p>';
  return text.split('\n')
    .filter(p => p.trim())
    .map(p => `<p>${escapeHtml(p.trim())}</p>`)
    .join('');
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── 🔄 Load Page Content ───────────────────────────────────────────────

async function loadPage() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  const pageBody = document.getElementById('page-body');

      // Fetch service details and all services (for related) in parallel

        apiFetch(`${CONFIG.ENDPOINTS.SERVICE}/${id}`),
        apiFetch(CONFIG.ENDPOINTS.SERVICES)
      ]);

// ── 🛒 Toggle Cart Item ─────────────────────────────────────────────────
async function toggleCart(id, title, price, emoji, category) {
  const inCart = CartLocal.has(id);
  const btn = document.getElementById('cart-btn');
  
  // Visual feedback
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.7';
  }
  
  try {
    if (inCart) {
      CartLocal.remove(id);
    } else {
      CartLocal.add({ id, title, price, emoji, category });
    }
    
    // Update UI
    const cartCount = document.getElementById('cart-count');
    if (cartCount) {
      cartCount.textContent = CartLocal.count();
    }
    
    const nowInCart = CartLocal.has(id);
    
    if (btn) {
      btn.innerHTML = `<i class="fas ${nowInCart ? 'fa-check' : 'fa-cart-plus'}" aria-hidden="true"></i> ${nowInCart ? 'Added to Cart' : 'Add to Cart'}`;
      btn.classList.toggle('in-cart', nowInCart);
      btn.setAttribute('aria-label', nowInCart ? 'Remove from cart' : 'Add to cart');
      
      // Button animation
      btn.style.transform = 'scale(0.98)';
      setTimeout(() => {
        btn.style.transform = '';
        btn.disabled = false;
        btn.style.opacity = '1';
      }, 150);
    }
    
    // Show toast
    showToast(nowInCart ? '✓ Added to cart!' : 'Removed from cart', nowInCart ? 'success' : 'default');
    
    // Sync with backend if logged in
    if (Auth.isLoggedIn() && !CONFIG.USE_MOCK) {
      try {
        const endpoint = nowInCart ? CONFIG.ENDPOINTS.CART_ADD : CONFIG.ENDPOINTS.CART_REMOVE;
        const method = nowInCart ? 'POST' : 'DELETE';
        
        await apiFetch(endpoint, {
          method,
          body: JSON.stringify({ service_id: id }),
          headers: { 'Content-Type': 'application/json' }
        });
      } catch (e) {
        console.warn('Cart sync warning:', e.message);
        // Don't show error to user - local cart still works
      }
    }
    
  } catch (error) {
    console.error('Cart toggle error:', error);
    showToast('Failed to update cart', 'error');
    if (btn) {
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  }
}

// ── 🔄 Scroll Animation Observer ───────────────────────────────────────
function setupScrollAnimations() {
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { 
      threshold: 0.1, 
      rootMargin: '0px 0px -30px 0px' 
    });
    
    document.querySelectorAll('.animate-on-scroll, .content-section').forEach(el => {
      if (!el.classList.contains('visible')) {
        observer.observe(el);
      }
    });
  } else {
    // Fallback: show all immediately
    document.querySelectorAll('.animate-on-scroll, .content-section').forEach(el => {
      el.classList.add('visible');
    });
  }
}

// ── 🚀 Initialize ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  // Initialize navigation
  renderNav();
  
  // Load page content
  await loadPage();
  
  // Add smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href && href !== '#') {
        e.preventDefault();
        const target = document.querySelector(href);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    });
  });
  
  // Keyboard shortcut: Press 'A' to add to cart (when not in input)
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'a' && 
        !e.target.matches('input, textarea, [contenteditable]') &&
        !e.ctrlKey && !e.metaKey && !e.altKey) {
      const cartBtn = document.getElementById('cart-btn');
      if (cartBtn && !cartBtn.disabled) {
        e.preventDefault();
        cartBtn.click();
      }
    }
  });
  
  // Handle page visibility change - refresh if needed
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && Auth.isLoggedIn()) {
      // Could refresh cart count or user data here
      renderNav();
    }
  });
  
  // Prevent zoom on double-tap (iOS)
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
  
  // Prevent gesture zoom on iOS
  document.addEventListener('gesturestart', (e) => e.preventDefault());
});

// ── 🧹 Cleanup on unload ──────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  // Clear any pending timeouts
  if (pageLoadPromise) {
    // Could abort fetch here if needed
  }
});
</script>
