<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0f0c1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Service Details — NovaStack</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    /* ===== 🎨 CSS Variables ===== */
    :root {
      --bg-primary: #0f0c1a;
      --bg-secondary: #1a162a;
      --bg-card: rgba(26, 22, 42, 0.9);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-hover: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.12);
      --border-hover: rgba(232, 93, 38, 0.6);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.4);
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.35);
      --blue: #3b82f6;
      --gradient-accent: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --gradient-2: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-3: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --gradient-ecom: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      --gradient-default: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 40px var(--accent-glow);
      --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-full: 9999px;
    }

    /* ===== 🌟 Base Reset ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body.menu-open { overflow: hidden; position: fixed; width: 100%; height: 100%; }

    /* Animated Background */
    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 15% 85%, rgba(124,58,237,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 85% 15%, rgba(255,107,53,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.06) 0%, transparent 70%);
      z-index: -2; animation: bgPulse 25s ease-in-out infinite; pointer-events: none;
    }
    @keyframes bgPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.85;transform:scale(1.03)} }

    /* Floating Particles */
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0.25; animation: float 18s infinite linear; }
    @keyframes float { 0%{transform:translateY(100vh) rotate(0);opacity:0} 10%,90%{opacity:0.25} 100%{transform:translateY(-20vh) rotate(720deg);opacity:0} }

    /* ===== 🔗 Navigation (Same as Index Page) ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(15,12,26,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%; display: flex; align-items: center; justify-content: space-between;
      height: 72px; transition: all var(--transition);
    }
    nav.scrolled { height: 64px; background: rgba(15,12,26,0.98); box-shadow: var(--shadow-md); }
    
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem;
      color: var(--text-primary); text-decoration: none;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .logo span { background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo i { color: var(--accent); }
    
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px;
      background: var(--gradient-accent); border-radius: var(--radius-full); transition: width var(--transition);
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
    .nav-links a.active { color: var(--accent); }

    /* Profile Section */
    .profile-section { position: relative; }
    .profile-trigger {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.8rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-full);
      cursor: pointer; transition: all var(--transition); min-height: 40px;
    }
    .profile-trigger:hover, .profile-trigger.active { background: var(--surface-hover); border-color: var(--accent); }
    .profile-avatar {
      width: 32px; height: 32px; background: var(--gradient-accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem; color: white;
    }
    .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .profile-name { font-size: 0.9rem; font-weight: 500; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-trigger i.chevron { font-size: 0.7rem; color: var(--text-muted); transition: transform var(--transition); }
    .profile-trigger.active i.chevron { transform: rotate(180deg); }
    
    .profile-dropdown {
      position: absolute; top: calc(100% + 12px); right: 0;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
      min-width: 240px; padding: 0.5rem 0; box-shadow: var(--shadow-lg); backdrop-filter: blur(20px);
      opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all var(--transition); z-index: 1001;
    }
    .profile-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0); }
    .profile-dropdown::before {
      content: ''; position: absolute; top: -6px; right: 24px; width: 12px; height: 12px;
      background: var(--bg-card); border-left: 1px solid var(--border); border-top: 1px solid var(--border);
      transform: rotate(45deg);
    }
    .dropdown-header { padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border); margin-bottom: 0.3rem; }
    .dropdown-header .profile-avatar { width: 40px; height: 40px; font-size: 1rem; margin-bottom: 0.4rem; }
    .dropdown-header .profile-name { font-size: 1rem; font-weight: 600; max-width: none; }
    .dropdown-header .user-email { font-size: 0.8rem; color: var(--text-muted); }
    .dropdown-item {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 1.2rem;
      color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;
      transition: all var(--transition); border-left: 3px solid transparent;
    }
    .dropdown-item:hover { background: var(--surface-hover); color: var(--text-primary); border-left-color: var(--accent); padding-left: 1.5rem; }
    .dropdown-item i { width: 20px; text-align: center; color: var(--accent); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }
    .logout-btn { color: #ef4444 !important; border-top: 1px solid var(--border); margin-top: 0.3rem; padding-top: 0.7rem; }
    .logout-btn i { color: #ef4444 !important; }

    /* Cart Button */
    .cart-btn { position: relative; display: inline-flex; align-items: center; gap: 0.4rem; }
    .cart-count {
      position: absolute; top: -6px; right: -8px; background: var(--gradient-accent);
      color: white; border-radius: var(--radius-full); width: 20px; height: 20px;
      font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none; font-size: 1.4rem; color: var(--accent); cursor: pointer;
      padding: 0.6rem; border-radius: var(--radius-md); min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-toggle:hover, .menu-toggle.active { background: var(--surface); }
    .menu-toggle i { transition: transform var(--transition); }
    .menu-toggle.active i { transform: rotate(90deg); }

    /* Mobile Menu Panel */
    .mobile-menu {
      position: fixed; top: 72px; left: 0; right: 0; background: var(--bg-secondary);
      border-bottom: 1px solid var(--border); padding: 1rem 5%; max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
      opacity: 0; z-index: 999; backdrop-filter: blur(20px);
    }
    .mobile-menu.active { max-height: 80vh; opacity: 1; overflow-y: auto; }
    .mobile-menu-inner { display: flex; flex-direction: column; gap: 0.5rem; padding-bottom: 1rem; }
    .mobile-nav-link {
      display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem;
      color: var(--text-secondary); text-decoration: none; font-size: 1rem; font-weight: 500;
      border-radius: var(--radius-md); transition: all var(--transition); min-height: 48px;
    }
    .mobile-nav-link:hover, .mobile-nav-link.active { background: var(--surface-hover); color: var(--text-primary); transform: translateX(4px); }
    .mobile-nav-link i { width: 24px; text-align: center; color: var(--accent); }
    .mobile-nav-link.active { color: var(--accent); border-left: 3px solid var(--accent); padding-left: 0.9rem; }
    .mobile-divider { height: 1px; background: var(--border); margin: 0.5rem 0; }
    .mobile-profile-section { padding: 0.5rem 0; }
    .mobile-profile-header {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1.2rem;
      background: var(--surface); border-radius: var(--radius-md); margin-bottom: 0.5rem; cursor: pointer;
    }
    .mobile-profile-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--gradient-accent);
      display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; text-transform: uppercase;
    }
    .mobile-profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .mobile-profile-info { flex: 1; min-width: 0; }
    .mobile-profile-name { font-weight: 600; color: var(--text-primary); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mobile-profile-email { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mobile-logout-btn {
      width: 100%; justify-content: center; color: #ef4444 !important;
      border-color: rgba(239,68,68,0.3) !important; margin: 0.5rem 1.2rem;
    }
    .mobile-logout-btn:hover { background: rgba(239,68,68,0.1) !important; }

    /* ===== 🥖 Breadcrumb ===== */
    .breadcrumb {
      padding: 1rem 5%; max-width: 1400px; margin: 0 auto; font-size: 0.85rem;
      color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { color: var(--border); font-size: 0.65rem; }
    .breadcrumb .current { color: var(--text-primary); font-weight: 500; }

    /* ===== 📐 Main Layout ===== */
    .layout {
      max-width: 1400px; margin: 0 auto; padding: 1rem 5% 4rem;
      display: grid; grid-template-columns: 1fr 360px; gap: 2.5rem; align-items: start;
    }

    /* ===== 🖼️ Project Hero ===== */
    .project-hero {
      position: relative; border-radius: var(--radius-xl); overflow: hidden;
      height: 320px; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center;
      font-size: 5.5rem; animation: fadeIn 0.6s ease-out; box-shadow: var(--shadow-lg);
    }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
    .project-hero::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.6)); z-index:1; }
    .project-hero::after {
      content:''; position:absolute; inset:-2px; border-radius:inherit; padding:2px;
      background:var(--gradient-accent); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude; opacity:0.6; animation:borderGlow 3s ease-in-out infinite; pointer-events:none;
    }
    @keyframes borderGlow { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    
    .thumb-web { background: var(--gradient-1); }
    .thumb-mobile { background: var(--gradient-1); }
    .thumb-ai { background: var(--gradient-2); }
    .thumb-portfolio { background: var(--gradient-3); }
    .thumb-ecom { background: var(--gradient-ecom); }
    .thumb-custom { background: var(--gradient-default); }
    
    .cat-badge {
      position: absolute; top: 1.2rem; left: 1.2rem;
      background: rgba(15,12,26,0.9); border: 1px solid var(--border); border-radius: var(--radius-full);
      padding: 0.35rem 1rem; font-size: 0.78rem; font-weight: 600; text-transform: capitalize;
      color: var(--text-primary); z-index: 2; display: flex; align-items: center; gap: 0.4rem; backdrop-filter: blur(10px);
    }
    .project-hero .emoji { position: relative; z-index: 2; animation: floatIcon 4s ease-in-out infinite; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3)); }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    /* ===== 📝 Content Section ===== */
    .content-section { animation: slideUp 0.5s ease-out 0.3s both; opacity: 0; }
    .content-section.visible { opacity: 1; }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    
    .project-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 0.8rem; line-height: 1.2;
    }
    .project-title span { background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    
    .project-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-muted); }
    .meta-item i { color: var(--accent); }
    
    .project-desc { color: var(--text-secondary); font-size: 1rem; line-height: 1.8; margin-bottom: 2.2rem; }
    .project-desc p { margin-bottom: 1rem; }
    .project-desc p:last-child { margin-bottom: 0; }

    /* ===== 🏷️ Section Labels ===== */
    .section-lbl {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted);
      margin: 2rem 0 1rem; display: flex; align-items: center; gap: 0.5rem;
      padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    }
    .section-lbl i { color: var(--accent); font-size: 0.9rem; }

    /* ===== 🔧 Technology Tags ===== */
    .tech-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.8rem; }
    .tech-tag {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-full);
      padding: 0.35rem 0.9rem; font-size: 0.82rem; font-weight: 500; color: var(--text-secondary);
      transition: all var(--transition); display: flex; align-items: center; gap: 0.4rem;
    }
    .tech-tag:hover { border-color: var(--accent); background: var(--surface-hover); color: var(--text-primary); transform: translateY(-2px); }
    .tech-tag i { font-size: 0.75rem; color: var(--accent); }

    /* ===== ✅ Features Grid ===== */
    .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; margin-bottom: 2rem; }
    .feature-item {
      display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.9rem; color: var(--text-secondary);
      padding: 0.5rem; border-radius: var(--radius-sm); transition: background var(--transition);
    }
    .feature-item:hover { background: var(--surface); }
    .feature-item::before {
      content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      color: var(--green); font-size: 0.85rem; flex-shrink: 0; margin-top: 3px;
    }

    /* ===== 🔗 Project Links ===== */
    .project-links { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .link-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem;
      border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 500; text-decoration: none;
      transition: all var(--transition); border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);
    }
    .link-btn i { font-size: 0.9rem; }
    .link-github { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    .link-github:hover { background: #fff; color: #1a1714; border-color: #fff; transform: translateY(-2px); }
    .link-demo { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: var(--blue); }
    .link-demo:hover { background: var(--blue); color: white; border-color: var(--blue); transform: translateY(-2px); }
    .link-na { background: var(--surface); color: var(--text-muted); border-style: dashed; cursor: not-allowed; opacity: 0.7; }

    /* ===== 🔗 Related Services ===== */
    .related-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); animation: slideUp 0.5s ease-out 0.5s both; opacity: 0; }
    .related-section.visible { opacity: 1; }
    .related-section h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
    .related-section h3 i { color: var(--accent); }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .related-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; text-decoration: none; color: var(--text-primary); transition: all var(--transition);
      display: block; backdrop-filter: blur(10px);
    }
    .related-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: var(--shadow-md), 0 0 30px var(--accent-glow); }
    .related-thumb { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2.3rem; position: relative; overflow: hidden; }
    .related-thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.4)); }
    .related-body { padding: 1rem; }
    .related-body h4 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; line-height: 1.3; }
    .related-card:hover .related-body h4 { color: var(--accent); }
    .related-body span { font-size: 0.82rem; color: var(--accent); font-weight: 700; display: flex; align-items: center; gap: 0.3rem; }

    /* ===== 🛒 Order Card (Sticky Sidebar) ===== */
    .order-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 1.8rem; position: sticky; top: 90px; backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg); border-top: 3px solid var(--gradient-accent);
      animation: slideInRight 0.5s ease-out 0.4s both; opacity: 0;
    }
    .order-card.visible { opacity: 1; }
    @keyframes slideInRight { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
    
    .order-price {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.3rem;
      background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.4rem;
    }
    .order-price-note { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
    
    .order-details { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; padding-bottom: 1.3rem; border-bottom: 1px solid var(--border); }
    .order-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); }
    .order-row:hover { background: var(--surface); }
    .order-row .lbl { color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem; }
    .order-row .lbl i { color: var(--accent); font-size: 0.85rem; }
    .order-row .val { font-weight: 600; color: var(--text-primary); }
    
    .btn-add-cart {
      width: 100%; padding: 1rem; background: var(--gradient-accent); color: #fff; border: none;
      border-radius: var(--radius-lg); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center;
      gap: 0.6rem; margin-bottom: 0.7rem; box-shadow: var(--shadow-glow); position: relative; overflow: hidden; min-height: 52px;
    }
    .btn-add-cart::before {
      content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); transition:left 0.5s;
    }
    .btn-add-cart:hover:not(:disabled)::before { left: 100%; }
    .btn-add-cart:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 45px var(--accent-glow); }
    .btn-add-cart.in-cart { background: linear-gradient(135deg, var(--green), #059669); box-shadow: 0 0 40px var(--green-glow); }
    
    .btn-contact {
      width: 100%; padding: 0.85rem; background: var(--surface); color: var(--text-primary);
      border: 1.5px solid var(--border); border-radius: var(--radius-lg); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-align: center; min-height: 48px;
    }
    .btn-contact:hover { border-color: var(--accent); background: var(--surface-hover); transform: translateY(-2px); }
    
    .guarantee {
      display: flex; align-items: flex-start; gap: 0.7rem; padding: 1rem;
      background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.4);
      border-radius: var(--radius-md); margin-top: 1.2rem; animation: fadeIn 0.5s ease-out 0.6s both; opacity: 0;
    }
    .guarantee.visible { opacity: 1; }
    .guarantee i { font-size: 1.3rem; color: var(--green); flex-shrink: 0; margin-top: 2px; }
    .guarantee p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin: 0; }

    /* ===== ⚠️ Error & Loading States ===== */
    .error-state, .loading-state { text-align: center; padding: 6rem 2rem; animation: fadeIn 0.5s ease-out; }
    .error-state .icon { font-size: 4rem; display: block; margin-bottom: 1.2rem; color: #ef4444; }
    .error-state h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.6rem; }
    .error-state p { color: var(--text-muted); margin-bottom: 1.8rem; font-size: 0.95rem; }
    
    .spinner {
      width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 1s linear infinite; margin: 5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 🍞 Toast Notification ===== */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      padding: 0.85rem 1.8rem; border-radius: var(--radius-full); font-size: 0.9rem; font-weight: 500;
      z-index: 9999; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); white-space: nowrap;
      color: #fff; display: flex; align-items: center; gap: 0.6rem; box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px); font-family: 'DM Sans', sans-serif; max-width: 90vw; text-align: center;
    }
    #toast.success { background: linear-gradient(135deg, var(--green), #059669); }
    #toast.error { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== 📱 Responsive Design - Mobile First ===== */
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .order-card { position: static; order: -1; }
    }
    
    @media (max-width: 768px) {
      /* Navigation */
      nav { padding: 0 4%; height: 68px; }
      .nav-links { display: none; }
      .nav-links.mobile-show {
        display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0;
        background: var(--bg-secondary); padding: 1rem; border-bottom: 1px solid var(--border); gap: 0.5rem;
      }
      .menu-toggle { display: flex; }
      .profile-name { display: none; }
      .profile-dropdown { right: -10px; min-width: 220px; }
      
      /* Layout */
      .layout { padding: 1rem 4% 3rem; gap: 2rem; }
      .breadcrumb { padding: 0.8rem 4%; font-size: 0.8rem; }
      
      /* Hero */
      .project-hero { height: 240px; font-size: 4rem; border-radius: var(--radius-lg); }
      .cat-badge { top: 0.8rem; left: 0.8rem; padding: 0.3rem 0.8rem; font-size: 0.72rem; }
      
      /* Content */
      .project-title { font-size: clamp(1.5rem, 5vw, 2rem); }
      .project-meta { gap: 0.8rem; }
      .meta-item { font-size: 0.8rem; }
      .project-desc { font-size: 0.95rem; }
      
      .features-grid { grid-template-columns: 1fr; gap: 0.5rem; }
      .project-links { flex-direction: column; }
      .link-btn { width: 100%; justify-content: center; padding: 0.8rem 1rem; }
      
      /* Order Card */
      .order-card { padding: 1.2rem; border-radius: var(--radius-md); }
      .order-price { font-size: 1.8rem; }
      .order-price-note { font-size: 0.8rem; }
      .order-row { font-size: 0.85rem; padding: 0.5rem; }
      .btn-add-cart, .btn-contact { padding: 0.9rem; font-size: 0.9rem; min-height: 50px; }
      .guarantee { padding: 0.8rem; gap: 0.6rem; }
      .guarantee i { font-size: 1.1rem; }
      .guarantee p { font-size: 0.8rem; }
      
      /* Related */
      .related-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .related-thumb { height: 80px; font-size: 1.8rem; }
      .related-body h4 { font-size: 0.85rem; }
      .related-body span { font-size: 0.78rem; }
    }
    
    @media (max-width: 480px) {
      nav { padding: 0 3%; }
      .layout { padding: 0.5rem 3% 2.5rem; }
      .breadcrumb { padding: 0.8rem 3%; }
      
      .project-hero { height: 200px; font-size: 3rem; }
      .project-title { font-size: 1.4rem; }
      
      .tech-list { gap: 0.4rem; }
      .tech-tag { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
      
      .related-grid { grid-template-columns: 1fr; }
      .related-thumb { height: 90px; }
      
      .order-card { padding: 1rem; }
      .order-price { font-size: 1.6rem; }
      .btn-add-cart, .btn-contact { padding: 0.85rem; font-size: 0.85rem; }
      
      /* Touch targets */
      .btn-add-cart, .btn-contact, .link-btn, .mobile-nav-link, .profile-trigger, .menu-toggle {
        min-height: 48px;
      }
    }
    
    /* Landscape mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .mobile-menu { max-height: 60vh; }
      .project-hero { height: 180px; }
      .order-card { position: static; }
    }

    /* ===== ♿ Accessibility ===== */
    a:focus, button:focus, .profile-trigger:focus, .menu-toggle:focus {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }
    
    /* ===== 🎨 Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #e55a2b; }
    
    /* ===== 🎭 Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      html { scroll-behavior: auto; }
    }
    
    /* ===== 📱 Safe Area for Notched Devices ===== */
    @supports (padding: max(0px)) {
      nav { padding-left: max(5%, env(safe-area-inset-left)); padding-right: max(5%, env(safe-area-inset-right)); }
      .breadcrumb, .layout { padding-left: max(5%, env(safe-area-inset-left)); padding-right: max(5%, env(safe-area-inset-right)); }
      .mobile-menu { padding-left: max(4%, env(safe-area-inset-left)); padding-right: max(4%, env(safe-area-inset-right)); }
    }
  </style>
</head>
<body>

<!-- 🔗 Navigation (Same as Index Page) -->

    <a href="signup.html" class="btn-sm" id="signup-btn" style="padding:0.45rem 1rem;background:var(--gradient-accent);border:none;border-radius:var(--radius-full);color:white;text-decoration:none;font-size:0.82rem;font-weight:600;transition:all var(--transition);">Sign Up</a>

          <div class="user-email" id="dropdownEmail">user@example.com</div>

        <a href="services.html" class="dropdown-item"><i class="fas fa-cube"></i> Browse Services</a>
        <a href="my-orders.html" class="dropdown-item"><i class="fas fa-shopping-bag"></i> My Orders</a>
        <a href="cart.html" class="dropdown-item"><i class="fas fa-shopping-cart"></i> Cart</a>

        <a href="cart.html" class="mobile-nav-link" style="padding-left:2.8rem"><i class="fas fa-shopping-cart"></i> Cart</a>
        <button class="mobile-logout-btn" id="mobileLogoutBtn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

      <a href="login.html" class="mobile-nav-link"><i class="fas fa-sign-in-alt"></i> Login</a>

<!-- 🥖 Breadcrumb -->
<div class="breadcrumb">
  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <span><i class="fas fa-chevron-right"></i></span>
  <a href="services.html"><i class="fas fa-layer-group"></i> Services</a>
  <span><i class="fas fa-chevron-right"></i></span>
  <span class="current" id="bc-title">Loading...</span>
</div>

<!-- 📐 Main Content -->
<div id="page-body">
  <div class="loading-state">
    <div class="spinner"></div>
    <p style="color:var(--text-muted);margin-top:1.2rem;font-size:0.95rem">Loading service details...</p>
  </div>
</div>

<!-- 🍞 Toast -->
<div id="toast" style="display:none"></div>

<script>
// ===== 🔧 CONFIG =====
const CONFIG = { API: 'https://novastack-backend.onrender.com', WA_NUMBER: '9015277062' };

// ===== 🎨 Create Particles =====
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 18 + 's';
    p.style.animationDuration = (18 + Math.random() * 12) + 's';
    p.style.opacity = 0.15 + Math.random() * 0.3;
    container.appendChild(p);
  }
}
createParticles();

// ===== 🔐 Auth Helpers =====
const Auth = {
  getToken() { return localStorage.getItem('dc_token') || sessionStorage.getItem('dc_token') || ''; },
  getUser() { try { const u = localStorage.getItem('dc_user') || sessionStorage.getItem('dc_user'); return u ? JSON.parse(u) : null; } catch { return null; } },
  isLoggedIn() { return !!this.getToken() && !!this.getUser(); }
};

// ===== 🛒 Cart Helpers =====
const Cart = {
  get() { try { return JSON.parse(localStorage.getItem('dc_cart_local') || '[]'); } catch { return []; } },
  set(items) { localStorage.setItem('dc_cart_local', JSON.stringify(items)); },
  has(id) { return this.get().some(c => c.id === id); },
  add(item) { const cart = this.get(); if (!this.has(item.id)) { cart.push(item); this.set(cart); } },
  remove(id) { this.set(this.get().filter(c => c.id !== id)); },
  count() { return this.get().length; }
};

// ===== 🌐 API Fetch =====
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const token = Auth.getToken();
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(CONFIG.API + path, { ...opts, headers, credentials: 'include' });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// ===== 🍞 Toast =====
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== 🧭 Navigation =====
function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const toggle = document.getElementById('menuToggle');
  const isActive = menu.classList.toggle('active');
  toggle.classList.toggle('active', isActive);
  toggle.setAttribute('aria-expanded', isActive);
  document.body.classList.toggle('menu-open', isActive);
}

function toggleProfileDropdown() {
  const dropdown = document.getElementById('profileDropdown');
  const trigger = document.getElementById('profileTrigger');
  const isActive = dropdown.classList.toggle('show');
  trigger.classList.toggle('active', isActive);
  trigger.setAttribute('aria-expanded', isActive);
}

function updateAuthUI() {
  const user = Auth.getUser();
  const isLoggedIn = Auth.isLoggedIn();
  
  // Desktop
  document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'inline-flex';
  document.getElementById('signup-btn').style.display = isLoggedIn ? 'none' : 'inline-flex';
  document.getElementById('profileSection').style.display = isLoggedIn ? 'block' : 'none';
  document.getElementById('logoutBtn').style.display = isLoggedIn ? 'inline-flex' : 'none';
  
  // Mobile
  document.getElementById('mobileAuthSection').style.display = isLoggedIn ? 'none' : 'block';
  document.getElementById('mobileProfileSection').style.display = isLoggedIn ? 'block' : 'none';
  
  if (isLoggedIn && user) {
    const name = user.name || user.email?.split('@')[0] || 'User';
    const initial = name.charAt(0).toUpperCase();
    
    // Desktop profile
    const avatar = document.getElementById('profileAvatar');
    const nameEl = document.getElementById('profileName');
    if (avatar && nameEl) {
      if (user.avatar) avatar.innerHTML = `<img src="${user.avatar}" alt="${name}">`;
      else avatar.textContent = initial;
      nameEl.textContent = name.length > 15 ? name.substring(0, 12) + '...' : name;
    }
    
    // Dropdown
    const dAvatar = document.getElementById('dropdownAvatar');
    const dName = document.getElementById('dropdownName');
    const dEmail = document.getElementById('dropdownEmail');
    if (dAvatar && dName && dEmail) {
      if (user.avatar) dAvatar.innerHTML = `<img src="${user.avatar}" alt="${name}">`;
      else dAvatar.textContent = initial;
      dName.textContent = name;
      dEmail.textContent = user.email || '';
    }
    
    // Mobile profile
    const mAvatar = document.getElementById('mobileProfileAvatar');
    const mName = document.getElementById('mobileProfileName');
    const mEmail = document.getElementById('mobileProfileEmail');
    if (mAvatar && mName && mEmail) {
      if (user.avatar) mAvatar.innerHTML = `<img src="${user.avatar}" alt="${name}">`;
      else mAvatar.textContent = initial;
      mName.textContent = name;
      mEmail.textContent = user.email || '';
    }
  }
  
  // Update cart count
  document.getElementById('cart-count').textContent = Cart.count();
}

function logout() {
  localStorage.removeItem('dc_token');
  localStorage.removeItem('dc_user');
  localStorage.removeItem('dc_cart_local');
  sessionStorage.removeItem('dc_token');
  sessionStorage.removeItem('dc_user');
  window.location.href = 'index.html';
}

// ===== 📋 Service Rendering =====
const THUMB = { web:'thumb-web', mobile:'thumb-mobile', ai:'thumb-ai', portfolio:'thumb-portfolio', ecom:'thumb-ecom', custom:'thumb-custom' };

function formatDescription(text) {
  if (!text) return '<p>No description available.</p>';
  return text.split('\n').filter(p => p.trim()).map(p => `<p>${p.trim()}</p>`).join('');
}

function getTechIcon(tech) {
  const icons = {
    'react':'fab fa-react', 'node':'fab fa-node-js', 'python':'fab fa-python',
    'django':'fas fa-django', 'flask':'fas fa-flask', 'mongodb':'fab fa-mongodb',
    'postgresql':'fas fa-database', 'mysql':'fas fa-database', 'firebase':'fas fa-fire',
    'aws':'fab fa-aws', 'docker':'fab fa-docker', 'tensorflow':'fas fa-brain',
    'nextjs':'fab fa-react', 'vue':'fab fa-vuejs', 'angular':'fab fa-angular'
  };
  return icons[tech.toLowerCase().trim()] || 'fas fa-code';
}

async function loadService() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'services.html'; return; }
  
  const body = document.getElementById('page-body');
  
  try {
    const [single, all] = await Promise.all([
      apiFetch(`/service/${id}`),
      apiFetch('/services')
    ]);
    
    const service = single.service;
    const allServices = all.services || [];
    
    if (!service) { window.location.href = 'services.html'; return; }
    
    // Update title & breadcrumb
    document.title = `${service.title} — NovaStack`;
    document.getElementById('bc-title').textContent = service.title;
    
    // Related services
    const related = allServices.filter(s => s.id !== service.id && s.category === service.category).slice(0, 3);
    const inCart = Cart.has(service.id);
    const category = (service.category || 'development').replace(/-/g, ' ');
    
    // Render page
    body.innerHTML = `
      <div class="layout">
        <!-- Main Content -->
        <div>
          <!-- Hero -->
          <div class="project-hero ${THUMB[service.category] || 'thumb-custom'}">
            <span class="emoji">${service.emoji || '<i class="fas fa-laptop-code"></i>'}</span>
            <div class="cat-badge"><i class="fas fa-tag"></i> ${category}</div>
          </div>
          
          <!-- Title & Meta -->
          <h1 class="project-title">${service.title}</h1>
          <div class="project-meta">
            <span class="meta-item"><i class="fas fa-clock"></i> ${service.delivery_days || 14} days</span>
            <span class="meta-item"><i class="fas fa-sync-alt"></i> ${service.revisions || 3} revisions</span>
            <span class="meta-item"><i class="fas fa-code"></i> ${(service.technologies||'').split(',').filter(t=>t.trim()).length} tech</span>
          </div>
          
          <!-- Description -->
          <div class="project-desc content-section" id="content-desc">${formatDescription(service.description)}</div>
          
          <!-- Technologies -->
          <div class="section-lbl content-section" id="lbl-tech"><i class="fas fa-microchip"></i> Technologies</div>
          <div class="tech-list content-section" id="tech-list">
            ${(service.technologies||'').split(',').map(t => {
              const tech = t.trim();
              if (!tech) return '';
              return `<span class="tech-tag"><i class="${getTechIcon(tech)}"></i> ${tech}</span>`;
            }).filter(Boolean).join('')}
          </div>
          
          <!-- Features -->
          ${service.features?.length ? `
            <div class="section-lbl content-section" id="lbl-features"><i class="fas fa-list-check"></i> What's Included</div>
            <div class="features-grid content-section" id="features-grid">
              ${service.features.map(f => `<div class="feature-item">${f}</div>`).join('')}
            </div>
          ` : ''}
          
          <!-- Links -->
          <div class="section-lbl content-section" id="lbl-links"><i class="fas fa-link"></i> Project Links</div>
          <div class="project-links content-section" id="project-links">
            <a href="${service.github_link || '#'}" class="link-btn ${service.github_link ? 'link-github' : 'link-na'}" ${service.github_link ? 'target="_blank" rel="noopener"' : ''}>
              <i class="fab fa-github"></i> ${service.github_link ? 'View GitHub' : 'Private'}
            </a>
            <a href="${service.live_url || '#'}" class="link-btn ${service.live_url ? 'link-demo' : 'link-na'}" ${service.live_url ? 'target="_blank" rel="noopener"' : ''}>
              <i class="fas fa-external-link-alt"></i> ${service.live_url ? 'Live Demo' : 'On Request'}
            </a>
          </div>
          
          <!-- Related -->
          ${related.length ? `
            <div class="related-section" id="related-section">
              <h3><i class="fas fa-sparkles"></i> You Might Also Like</h3>
              <div class="related-grid">
                ${related.map(r => `
                  <a href="project.html?id=${r.id}" class="related-card">
                    <div class="related-thumb ${THUMB[r.category]||'thumb-custom'}">${r.emoji||'<i class="fas fa-laptop-code"></i>'}</div>
                    <div class="related-body">
                      <h4>${r.title.length>30 ? r.title.substring(0,30)+'…' : r.title}</h4>
                      <span><i class="fas fa-tag"></i> From ₹${r.price}</span>
                    </div>
                  </a>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>
        
        <!-- Sticky Order Card -->
        <div>
          <div class="order-card" id="order-card">
            <div class="order-price">₹${parseFloat(service.price).toLocaleString('en-IN')}</div>
            <div class="order-price-note">Starting price — final quote after discussion</div>
            
            <div class="order-details">
              <div class="order-row"><span class="lbl"><i class="fas fa-clock"></i> Delivery</span><span class="val">${service.delivery_days||14} days</span></div>
              <div class="order-row"><span class="lbl"><i class="fas fa-sync-alt"></i> Revisions</span><span class="val">${service.revisions||3} included</span></div>
              <div class="order-row"><span class="lbl"><i class="fas fa-code-branch"></i> Source Code</span><span class="val">✓ Full access</span></div>
              <div class="order-row"><span class="lbl"><i class="fas fa-headset"></i> Support</span><span class="val">WhatsApp + Email</span></div>
            </div>
            
            <button class="btn-add-cart ${inCart?'in-cart':''}" id="cartBtn" onclick="toggleCart(${service.id}, '${service.title.replace(/'/g,"\\'")}', ${service.price}, '${service.emoji||'💻'}', '${service.category||''}')">
              <i class="fas ${inCart?'fa-check':'fa-cart-plus'}"></i> ${inCart?'Added to Cart':'Add to Cart'}
            </button>
            
            <a href="https://wa.me/${CONFIG.WA_NUMBER}?text=Hi!%20Interested%20in%20${encodeURIComponent(service.title)}%20(₹${service.price})" 
               class="btn-contact" target="_blank" rel="noopener">
              <i class="fab fa-whatsapp"></i> Discuss Project
            </a>
            
            <div class="guarantee" id="guarantee">
              <i class="fas fa-shield-alt"></i>
              <p>100% satisfaction guarantee. Free revisions until you're happy.</p>
            </div>
          </div>
        </div>
      </div>
    `;
    
    // Trigger animations
    setTimeout(() => {
      document.getElementById('content-desc')?.classList.add('visible');
      document.getElementById('lbl-tech')?.classList.add('visible');
      document.getElementById('tech-list')?.classList.add('visible');
      document.getElementById('lbl-features')?.classList.add('visible');
      document.getElementById('features-grid')?.classList.add('visible');
      document.getElementById('lbl-links')?.classList.add('visible');
      document.getElementById('project-links')?.classList.add('visible');
      document.getElementById('order-card')?.classList.add('visible');
      document.getElementById('guarantee')?.classList.add('visible');
      document.getElementById('related-section')?.classList.add('visible');
    }, 100);
    
  } catch (err) {
    console.error('Load error:', err);
    body.innerHTML = `
      <div class="error-state">
        <span class="icon"><i class="fas fa-exclamation-triangle"></i></span>
        <h2>Could Not Load Service</h2>
        <p>${err.message || 'Please check your connection'}</p>
        <a href="services.html" class="btn-accent" style="padding:0.7rem 1.5rem;background:var(--gradient-accent);color:white;border:none;border-radius:var(--radius-full);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:0.5rem">
          <i class="fas fa-arrow-left"></i> Back to Services
        </a>
      </div>
    `;
  }
}

// ===== 🛒 Toggle Cart =====
async function toggleCart(id, title, price, emoji, category) {
  const inCart = Cart.has(id);
  if (inCart) Cart.remove(id); else Cart.add({ id, title, price, emoji, category });
  
  document.getElementById('cart-count').textContent = Cart.count();
  const btn = document.getElementById('cartBtn');
  const nowInCart = Cart.has(id);
  
  if (btn) {
    btn.innerHTML = `<i class="fas ${nowInCart?'fa-check':'fa-cart-plus'}"></i> ${nowInCart?'Added to Cart':'Add to Cart'}`;
    btn.classList.toggle('in-cart', nowInCart);
  }
  
  showToast(nowInCart ? '✓ Added to cart!' : 'Removed from cart', nowInCart ? 'success' : 'default');
  
  // Sync with backend if logged in
  if (Auth.isLoggedIn()) {
    try {
      await apiFetch(nowInCart ? '/cart/add' : '/cart/remove', {
        method: nowInCart ? 'POST' : 'DELETE',
        body: JSON.stringify({ service_id: id })
      });
    } catch (e) { console.warn('Cart sync warning:', e.message); }
  }
}

// ===== 🔄 Initialize =====
document.addEventListener('DOMContentLoaded', async () => {
  // Auth check & UI
  if (Auth.isLoggedIn()) {
    try {
      const fresh = await apiFetch('/user');
      if (fresh.user) localStorage.setItem('dc_user', JSON.stringify(fresh.user));
    } catch (e) { console.warn('User refresh failed:', e.message); }
  }
  updateAuthUI();
  
  // Load service
  await loadService();
  
  // Event listeners
  document.getElementById('menuToggle')?.addEventListener('click', toggleMobileMenu);
  document.getElementById('profileTrigger')?.addEventListener('click', (e) => { e.stopPropagation(); toggleProfileDropdown(); });
  document.getElementById('dropdownLogout')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
  document.getElementById('mobileLogoutBtn')?.addEventListener('click', logout);
  document.getElementById('mobileProfileToggle')?.addEventListener('click', () => {
    const menu = document.getElementById('mobileProfileMenu');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  });
  
  // Close dropdowns on outside click
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('profileDropdown');
    const trigger = document.getElementById('profileTrigger');
    if (dropdown && !trigger.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.remove('show');
      trigger.classList.remove('active');
    }
    const mobileMenu = document.getElementById('mobileMenu');
    const menuToggle = document.getElementById('menuToggle');
    if (mobileMenu.classList.contains('active') && !mobileMenu.contains(e.target) && !menuToggle.contains(e.target)) {
      toggleMobileMenu();
    }
  });
  
  // Navbar scroll effect
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    nav.classList.toggle('scrolled', window.scrollY > 50);
  });
  
  // Prevent double-tap zoom on iOS
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
});

// Keyboard: Press 'A' to add to cart
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'a' && !e.target.matches('input,textarea')) {
    document.getElementById('cartBtn')?.click();
  }
});
</script>
