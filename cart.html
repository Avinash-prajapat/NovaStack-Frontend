<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — DevCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== 🎨 Modern CSS Variables (Matching Design System) ===== */
    :root {
      --bg-primary: #0f0c1a;
      --bg-secondary: #1a162a;
      --bg-card: rgba(26, 22, 42, 0.85);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-hover: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.12);
      --border-hover: rgba(232, 93, 38, 0.6);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.4);
      --accent-secondary: #7c3aed;
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.3);
      --error: #ef4444;
      --error-glow: rgba(239, 68, 68, 0.3);
      --gradient-accent: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --gradient-2: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --gradient-3: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      --gradient-ecom: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      --gradient-default: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 40px var(--accent-glow);
      --transition-fast: 150ms ease;
      --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 9999px;
    }

    /* ===== 🌟 Base Reset ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
      z-index: -2;
      animation: bgPulse 25s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes bgPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.03); }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.25;
      animation: float 18s infinite linear;
    }
    
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.25; }
      90% { opacity: 0.25; }
      100% { transform: translateY(-20vh) rotate(720deg); opacity: 0; }
    }

    /* ===== 🔗 Navigation ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(15, 12, 26, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      transition: all var(--transition-normal);
    }
    
    nav.scrolled {
      height: 64px;
      background: rgba(15, 12, 26, 0.95);
      box-shadow: var(--shadow-md);
    }
    
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: transform var(--transition-fast);
    }
    
    .logo:hover { transform: scale(1.05); }
    .logo span {
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav-right {
      display: flex;
      gap: 0.7rem;
      align-items: center;
    }

    /* ===== ✨ Modern Buttons ===== */
    .btn {
      padding: 0.55rem 1.2rem;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      border: none;
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover::before { left: 100%; }
    
    .btn-sm {
      padding: 0.45rem 1rem;
      font-size: 0.82rem;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      transition: all var(--transition-normal);
    }
    
    .btn-sm:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    
    .btn-accent {
      background: var(--gradient-accent);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    
    .btn-accent:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    
    .btn-lg {
      padding: 0.9rem 1.8rem;
      font-size: 0.95rem;
      border-radius: var(--radius-lg);
    }

    /* ===== 🛒 Cart Container ===== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 5% 4rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      align-items: start;
    }
    
    .cart-header {
      grid-column: 1 / -1;
      margin-bottom: 1.5rem;
      animation: slideInDown 0.5s ease-out;
    }
    
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .cart-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .cart-header h1 i {
      color: var(--accent);
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .cart-header p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-top: 0.4rem;
    }

    /* ===== 📦 Cart Items List ===== */
    .cart-items-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .cart-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.3rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: all var(--transition-normal);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      animation: slideInLeft 0.4s ease-out both;
      opacity: 0;
    }
    
    .cart-item.visible { opacity: 1; }
    
    .cart-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--gradient-accent);
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    
    .cart-item:hover {
      transform: translateX(6px) translateY(-2px);
      border-color: var(--accent);
      box-shadow: var(--shadow-md), 0 0 30px var(--accent-glow);
    }
    
    .cart-item:hover::before { opacity: 1; }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .item-thumb {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: transform var(--transition-normal);
      position: relative;
      overflow: hidden;
    }
    
    .cart-item:hover .item-thumb {
      transform: scale(1.1) rotate(3deg);
    }
    
    .thumb-web { background: var(--gradient-1); }
    .thumb-mobile { background: var(--gradient-1); }
    .thumb-ai { background: var(--gradient-2); }
    .thumb-ecom { background: var(--gradient-ecom); }
    .thumb-default { background: var(--gradient-default); }
    
    .item-info {
      flex: 1;
      min-width: 0;
    }
    
    .item-info h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
      transition: color var(--transition-fast);
    }
    
    .cart-item:hover .item-info h3 {
      color: var(--accent);
    }
    
    .item-info p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    .item-price {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--accent);
      margin-right: 0.5rem;
      min-width: 80px;
      text-align: right;
    }
    
    .remove-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    
    .remove-btn:hover {
      background: var(--error);
      color: white;
      border-color: var(--error);
      transform: scale(1.1) rotate(90deg);
    }

    /* ===== 🪧 Empty Cart State ===== */
    .empty-cart {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .empty-cart .icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: float 3s ease-in-out infinite;
    }
    
    .empty-cart h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 0.6rem;
    }
    
    .empty-cart p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .empty-cart .btn {
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
    }

    /* ===== 🧾 Order Summary ===== */
    .order-summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      position: sticky;
      top: 90px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      border-top: 3px solid var(--gradient-accent);
      animation: slideInRight 0.5s ease-out;
    }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .order-summary h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .order-summary h2 i { color: var(--accent); }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      padding: 0.4rem 0;
      transition: background var(--transition-fast);
      padding: 0.5rem 0.8rem;
      border-radius: var(--radius-sm);
    }
    
    .summary-row:hover {
      background: var(--surface);
    }
    
    .summary-row .lbl {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .summary-row .lbl i { color: var(--accent); font-size: 0.8rem; }
    
    .summary-row .val {
      font-weight: 600;
      color: var(--text-primary);
    }
    
    hr.divider {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1.2rem 0;
    }
    
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      padding: 0.8rem 0;
      color: var(--text-primary);
    }
    
    .summary-total .val {
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .advance-note {
      background: rgba(255, 107, 53, 0.12);
      border: 1px solid rgba(255, 107, 53, 0.4);
      border-radius: var(--radius-md);
      padding: 0.9rem 1.1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin: 1.2rem 0;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    
    .advance-note i {
      color: var(--accent);
      font-size: 1.1rem;
      margin-top: 2px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* ===== 🎯 Action Buttons ===== */
    .btn-place {
      width: 100%;
      padding: 1rem;
      background: var(--gradient-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
      box-shadow: var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }
    
    .btn-place::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }
    
    .btn-place:hover:not(:disabled)::before { left: 100%; }
    .btn-place:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 45px var(--accent-glow);
    }
    .btn-place:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn-clear-cart {
      width: 100%;
      padding: 0.65rem;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    
    .btn-clear-cart:hover {
      color: var(--error);
      border-color: var(--error);
      background: rgba(239, 68, 68, 0.1);
      transform: translateY(-2px);
    }

    /* ===== 🔐 Login Prompt ===== */
    .login-prompt {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: var(--radius-md);
      padding: 1.2rem;
      text-align: center;
      margin-top: 1rem;
      animation: fadeIn 0.4s ease-out;
    }
    
    .login-prompt p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
    }
    
    .login-prompt-btns {
      display: flex;
      gap: 0.6rem;
    }
    
    .login-prompt-btns a {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all var(--transition-normal);
    }
    
    .lp-login {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .lp-login:hover {
      background: var(--surface-hover);
      border-color: var(--text-primary);
      transform: translateY(-2px);
    }
    
    .lp-signup {
      background: var(--gradient-accent);
      color: #fff;
    }
    
    .lp-signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    /* ===== ✨ Trust Notes ===== */
    .trust-notes {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    
    .trust-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }
    
    .trust-note:hover {
      background: var(--surface);
      color: var(--text-secondary);
      transform: translateX(4px);
    }
    
    .trust-note i {
      color: var(--accent);
      font-size: 0.9rem;
      width: 18px;
      text-align: center;
    }

    /* ===== 💬 WhatsApp Float ===== */
    .whatsapp-float {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 0.85rem 1.5rem;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 6px 30px rgba(37, 211, 102, 0.5);
      transition: all var(--transition-normal);
      animation: floatUp 0.6s ease 0.3s both;
    }
    
    .whatsapp-float:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 12px 45px rgba(37, 211, 102, 0.7);
    }
    
    .whatsapp-float i { font-size: 1.2rem; }
    
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 🌀 Loading & Toast ===== */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 3rem auto;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 0.85rem 1.8rem;
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 9999;
      transition: transform var(--transition-normal);
      white-space: nowrap;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
    }
    
    #toast.success {
      background: linear-gradient(135deg, var(--green), #059669);
    }
    
    #toast.error {
      background: linear-gradient(135deg, var(--error), #b91c1c);
    }
    
    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 📱 Responsive Design ===== */
    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
        padding-top: 100px;
      }
      .order-summary {
        position: static;
        order: -1;
      }
    }
    
    @media (max-width: 640px) {
      nav { padding: 0 4%; height: 68px; }
      .nav-right { gap: 0.5rem; }
      .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.78rem; }
      
      .container { padding: 90px 4% 3rem; }
      .cart-header h1 { font-size: 1.6rem; }
      .cart-header p { font-size: 0.9rem; }
      
      .cart-item {
        flex-wrap: wrap;
        padding: 1rem;
      }
      .item-thumb { width: 52px; height: 52px; font-size: 1.4rem; }
      .item-info { min-width: calc(100% - 140px); }
      .item-price { font-size: 1.1rem; min-width: auto; }
      .remove-btn { width: 32px; height: 32px; font-size: 0.9rem; }
      
      .order-summary { padding: 1.4rem; }
      .summary-total { font-size: 1.2rem; }
      .btn-place { padding: 0.9rem; font-size: 0.95rem; }
      
      .login-prompt-btns { flex-direction: column; }
      
      .whatsapp-float {
        bottom: 1.2rem;
        right: 1.2rem;
        padding: 0.7rem 1.2rem;
        font-size: 0.85rem;
      }
    }

    /* ===== 🎭 Scroll Animations ===== */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }
    
    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb {
      background: var(--gradient-accent);
      border-radius: var(--radius-full);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Focus States */
    a:focus, button:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- Animated Particles Background -->
<div class="particles" id="particles"></div>

<!-- 🔗 Navigation -->
<nav id="navbar">
  <a class="logo" href="index.html"><i class="fas fa-code"></i> Dev<span>Craft</span></a>
  <div class="nav-right">
    <a href="services.html" class="btn-sm"><i class="fas fa-arrow-left"></i> Browse</a>
    <a href="login.html" class="btn-sm" id="login-btn">Login</a>
    <a href="signup.html" class="btn-sm btn-accent" id="signup-btn">Sign Up</a>
    <span id="user-nav" style="display:none;font-size:0.85rem;color:var(--text-secondary)"></span>
    <button id="logout-btn" style="display:none;" class="btn-sm" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</nav>

<!-- 🛒 Main Content -->
<div class="container">
  <div class="cart-header animate-on-scroll">
    <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
    <p>Review your selected services before placing your order</p>
  </div>
  
  <!-- Cart Items Column -->
  <div id="cart-items-col">
    <div style="text-align:center;padding:3rem">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);margin-top:1rem">Loading your cart...</p>
    </div>
  </div>
  
  <!-- Order Summary Column -->
  <div id="summary-col">
    <div class="order-summary animate-on-scroll">
      <h2><i class="fas fa-receipt"></i> Order Summary</h2>
      <div id="summary-body">
        <p style="color:var(--text-muted);font-size:0.9rem;text-align:center;padding:1.5rem">
          <i class="fas fa-cart-arrow-down" style="font-size:2rem;display:block;margin-bottom:0.8rem;opacity:0.5"></i>
          No items in cart
        </p>
      </div>
      <hr class="divider">
      <div id="action-body"></div>
      
      <div class="trust-notes">
        <div class="trust-note"><i class="fas fa-shield-alt"></i> Secure & confidential</div>
        <div class="trust-note"><i class="fas fa-code-branch"></i> Full source code delivered</div>
        <div class="trust-note"><i class="fas fa-sync-alt"></i> Free revisions included</div>
        <div class="trust-note"><i class="fas fa-headset"></i> 24/7 WhatsApp support</div>
      </div>
    </div>
  </div>
</div>

<!-- 💬 WhatsApp Float -->
<a href="#" class="whatsapp-float" id="wa-link" target="_blank" rel="noopener">
  <i class="fab fa-whatsapp"></i> Chat on WhatsApp
</a>

<!-- 🍞 Toast Notification -->
<div id="toast" style="display:none"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const CONFIG = { API: 'http://172.20.68.74:5000', WA_NUMBER: '923001234567' };
document.getElementById('wa-link').href = `https://wa.me/${CONFIG.WA_NUMBER}`;

// ── Create Floating Particles ─────────────────────────────────────────────
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 18 + 's';
    particle.style.animationDuration = (18 + Math.random() * 12) + 's';
    particle.style.opacity = 0.15 + Math.random() * 0.3;
    container.appendChild(particle);
  }
}
createParticles();

// ── Navbar Scroll Effect ──────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  if (window.scrollY > 50) {
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
});

// ── Auth & Cart Helpers ───────────────────────────────────────────────────
const Auth = {
  getToken() { return localStorage.getItem('dc_token') || ''; },
  getUser()  { try { return JSON.parse(localStorage.getItem('dc_user') || 'null'); } catch { return null; } },
  isLoggedIn() { return !!this.getToken() && !!this.getUser(); },
};

const CartLocal = {
  get()  { try { return JSON.parse(localStorage.getItem('dc_cart_local') || '[]'); } catch { return []; } },
  set(items) { localStorage.setItem('dc_cart_local', JSON.stringify(items)); },
  remove(id) { this.set(this.get().filter(c => c.id !== id)); },
  clear() { this.set([]); },
};

function logout() { 
  localStorage.removeItem('dc_token'); 
  localStorage.removeItem('dc_user'); 
  localStorage.removeItem('dc_cart_local'); 
  window.location.reload(); 
}

function renderNav() {
  const user = Auth.getUser();
  if (user && Auth.isLoggedIn()) {
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('signup-btn').style.display = 'none';
    const u = document.getElementById('user-nav');
    u.style.display = 'inline';
    u.textContent = `👤 ${user.name || user.email}`;
    document.getElementById('logout-btn').style.display = 'inline-flex';
  }
}

// ── API Fetch ─────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (opts.auth) headers['Authorization'] = `Bearer ${Auth.getToken()}`;
  const res = await fetch(CONFIG.API + path, { ...opts, headers });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

// ── Service Thumbnails ────────────────────────────────────────────────────
const THUMB = {
  web: 'thumb-web',
  mobile: 'thumb-mobile',
  ai: 'thumb-ai',
  portfolio: 'thumb-default',
  ecom: 'thumb-ecom',
  custom: 'thumb-default'
};

// ── Load Cart ─────────────────────────────────────────────────────────────
async function loadCart() {
  let items = [];
  
  if (Auth.isLoggedIn()) {
    try {
      const data = await apiFetch('/cart', { auth: true });
      items = data.items || [];
      CartLocal.set(items); // Sync local mirror
    } catch (e) {
      items = CartLocal.get();
      console.warn('Using local cart:', e.message);
    }
  } else {
    items = CartLocal.get();
  }
  
  render(items);
}

// ── Render Cart ───────────────────────────────────────────────────────────
function render(items) {
  const itemsCol = document.getElementById('cart-items-col');
  const summaryBody = document.getElementById('summary-body');
  const actionBody = document.getElementById('action-body');

  if (!items.length) {
    itemsCol.innerHTML = `
      <div class="empty-cart animate-on-scroll visible">
        <span class="icon"><i class="fas fa-shopping-basket"></i></span>
        <h3>Your cart is empty</h3>
        <p>Browse our premium services and add what you need to get started</p>
        <a href="services.html" class="btn btn-accent">
          <i class="fas fa-compass"></i> Browse Services
        </a>
      </div>
    `;
    summaryBody.innerHTML = `
      <p style="color:var(--text-muted);font-size:0.9rem;text-align:center;padding:1.5rem">
        <i class="fas fa-info-circle" style="font-size:1.5rem;display:block;margin-bottom:0.6rem;opacity:0.5"></i>
        Add services to see your order summary
      </p>
    `;
    actionBody.innerHTML = '';
    return;
  }

  const subtotal = items.reduce((s, i) => s + parseFloat(i.price || 0), 0);
  const advance = Math.round(subtotal * 0.2);
  const balance = subtotal - advance;

  // Render cart items with animation
  itemsCol.innerHTML = `
    <div class="cart-items-list">
      ${items.map((item, index) => `
        <div class="cart-item" id="item-${item.id}" style="animation-delay: ${index * 0.1}s">
          <div class="item-thumb ${THUMB[item.category] || 'thumb-default'}">
            ${item.emoji || '<i class="fas fa-laptop-code"></i>'}
          </div>
          <div class="item-info">
            <h3>${item.title}</h3>
            <p><i class="fas fa-tag"></i> ${item.category || 'Software'} service</p>
          </div>
          <div class="item-price">$${parseFloat(item.price).toLocaleString()}</div>
          <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove item" aria-label="Remove ${item.title}">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `).join('')}
    </div>
  `;

  // Trigger item animations
  setTimeout(() => {
    document.querySelectorAll('.cart-item').forEach((item, i) => {
      item.style.opacity = '1';
      item.style.transform = 'translateX(0)';
    });
  }, 100);

  // Render summary
  summaryBody.innerHTML = `
    ${items.map(i => `
      <div class="summary-row">
        <span class="lbl"><i class="fas fa-check"></i> ${(i.title || '').substring(0, 24)}${(i.title || '').length > 24 ? '...' : ''}</span>
        <span class="val">$${parseFloat(i.price).toLocaleString()}</span>
      </div>
    `).join('')}
    <hr class="divider">
    <div class="summary-row">
      <span class="lbl"><i class="fas fa-percent"></i> Advance (20%)</span>
      <span class="val" style="color:var(--accent)">-$${advance.toLocaleString()}</span>
    </div>
    <div class="summary-row">
      <span class="lbl"><i class="fas fa-wallet"></i> Balance Due</span>
      <span class="val">$${balance.toLocaleString()}</span>
    </div>
    <hr class="divider">
    <div class="summary-total">
      <span>Total</span>
      <span class="val">$${subtotal.toLocaleString()}</span>
    </div>
    <div class="advance-note">
      <i class="fas fa-lightbulb"></i>
      <span>A 20% advance (<strong>$${advance.toLocaleString()}</strong>) is required to start development. Balance due upon project delivery.</span>
    </div>
  `;

  // Render action buttons
  const user = Auth.getUser();
  if (user && Auth.isLoggedIn()) {
    actionBody.innerHTML = `
      <button class="btn-place" onclick="placeOrder()">
        <i class="fas fa-rocket"></i> Place Order — Pay $${advance.toLocaleString()} Advance
      </button>
      <button class="btn-clear-cart" onclick="clearCart()">
        <i class="fas fa-trash-alt"></i> Clear Cart
      </button>
    `;
  } else {
    actionBody.innerHTML = `
      <div class="login-prompt">
        <p><i class="fas fa-lock"></i> Log in or create an account to place your order</p>
        <div class="login-prompt-btns">
          <a href="login.html?redirect=cart.html" class="lp-login">
            <i class="fas fa-sign-in-alt"></i> Log In
          </a>
          <a href="signup.html" class="lp-signup">
            <i class="fas fa-user-plus"></i> Sign Up
          </a>
        </div>
      </div>
      <button class="btn-clear-cart" style="margin-top:0.8rem" onclick="clearCart()">
        <i class="fas fa-trash-alt"></i> Clear Cart
      </button>
    `;
  }
}

// ── Remove Item ───────────────────────────────────────────────────────────
async function removeItem(id) {
  // Visual feedback
  const item = document.getElementById(`item-${id}`);
  if (item) {
    item.style.transition = 'all 0.3s ease';
    item.style.opacity = '0';
    item.style.transform = 'translateX(-20px)';
  }
  
  CartLocal.remove(id);
  
  if (Auth.isLoggedIn()) {
    try {
      await apiFetch('/cart/remove', {
        method: 'DELETE',
        body: JSON.stringify({ service_id: id }),
        auth: true
      });
    } catch (e) {
      console.warn('Remove sync:', e.message);
    }
  }
  
  setTimeout(() => loadCart(), 300);
  showToast('Item removed from cart', 'success');
}

// ── Clear Cart ────────────────────────────────────────────────────────────
async function clearCart() {
  if (!confirm('⚠️ Clear all items from your cart?\n\nThis action cannot be undone.')) return;
  
  CartLocal.clear();
  
  if (Auth.isLoggedIn()) {
    const items = CartLocal.get();
    for (const item of items) {
      try {
        await apiFetch('/cart/remove', {
          method: 'DELETE',
          body: JSON.stringify({ service_id: item.id }),
          auth: true
        });
      } catch {}
    }
  }
  
  loadCart();
  showToast('Cart cleared', 'success');
}

// ── Place Order ───────────────────────────────────────────────────────────
async function placeOrder() {
  const btn = document.querySelector('.btn-place');
  if (!btn) return;
  
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  
  try {
    const data = await apiFetch('/order/place', {
      method: 'POST',
      body: '{}',
      auth: true
    });
    
    localStorage.setItem('dc_last_order', JSON.stringify(data));
    CartLocal.clear();
    
    showToast('Order placed successfully! 🎉', 'success');
    setTimeout(() => {
      window.location.href = 'order.html';
    }, 1500);
    
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = originalText;
    showToast(`Error: ${e.message}`, 'error');
  }
}

// ── Toast Notification ────────────────────────────────────────────────────
function showToast(msg, type = 'default') {
  let toast = document.getElementById('toast');
  
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
      padding:0.85rem 1.8rem;border-radius:9999px;font-size:0.9rem;font-weight:500;
      z-index:9999;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space:nowrap;color:#fff;display:flex;align-items:center;gap:0.6rem;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);backdrop-filter:blur(10px);
      font-family:'DM Sans',sans-serif;
    `;
    document.body.appendChild(toast);
  }
  
  toast.className = type;
  toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
  toast.style.display = 'flex';
  
  // Trigger animation
  requestAnimationFrame(() => {
    toast.classList.add('show');
  });
  
  // Auto hide
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => { toast.style.display = 'none'; }, 300);
  }, 3500);
}

// ── Scroll Animation Observer ─────────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

// Observe animate-on-scroll elements
document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));

// ── Initialize ────────────────────────────────────────────────────────────
renderNav();
loadCart();

// Add smooth scroll for anchor links
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});
</script>
</body>
</html>
