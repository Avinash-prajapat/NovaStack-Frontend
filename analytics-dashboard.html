<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStack - Advanced Data Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .dashboard-header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: rgba(26, 22, 42, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dashboard-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .filter-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            font-family: inherit;
        }
        .btn {
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid #ff6b35; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #ff6b35; }
        .stat-value { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #ff6b35, #f7c531); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 5px; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .chart-card:hover { transform: translateY(-3px); border-color: #ff6b35; }
        .chart-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff6b35;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .full-width { grid-column: span 3; }
        .half-width { grid-column: span 2; }
        canvas { max-height: 250px; width: 100%; }
        
        .data-table {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #ff6b35; font-weight: 600; }
        
        .insights-section {
            background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(247,197,49,0.05));
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255,107,53,0.3);
        }
        .insight-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .insight-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .insight-value { font-size: 1.5rem; font-weight: 700; color: #ff6b35; }
        .insight-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 5px; }
        
        .loading { text-align: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #ff6b35; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .charts-grid { grid-template-columns: repeat(2, 1fr); }
            .full-width { grid-column: span 2; }
            .insight-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .half-width { grid-column: span 1; }
            .insight-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line"></i> NovaStack Advanced Analytics Dashboard</h1>
            <p>Comprehensive Data Analytics | 15+ Interactive Visualizations | Real-time Database</p>
            <div class="filter-bar">
                <input type="date" id="startDate" class="filter-input">
                <input type="date" id="endDate" class="filter-input">
                <button class="btn" onclick="filterByDate()"><i class="fas fa-filter"></i> Apply Filter</button>
                <button class="btn btn-outline" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export Report</button>
                <button class="btn" onclick="loadAllData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="last-updated" id="lastUpdated" style="margin-top: 10px; font-size: 0.8rem;">Loading data...</div>
        </div>
        <div id="dashboardContent"><div class="loading"><div class="spinner"></div><p>Fetching real-time data from database...</p></div></div>
    </div>

    <script>
        const API = 'https://novastack-backend.onrender.com';
        let adminToken = localStorage.getItem('nova_admin_token');
        let analyticsData = { orders: [], payments: [], users: [], services: [], refunds: [] };
        let charts = {};
        
        async function apiCall(endpoint) {
            try {
                const headers = {};
                if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
                const response = await fetch(`${API}${endpoint}`, { headers });
                return await response.json();
            } catch (error) { return null; }
        }
        
        async function loadAllData() {
            document.getElementById('dashboardContent').innerHTML = `<div class="loading"><div class="spinner"></div><p>Fetching real-time data from database...</p></div>`;
            try {
                const [ordersRes, paymentsRes, usersRes, servicesRes, refundsRes] = await Promise.all([
                    apiCall('/admin/orders'), apiCall('/admin/payment-history'), apiCall('/admin/users'),
                    apiCall('/admin/services'), apiCall('/admin/refunds/history')
                ]);
                analyticsData.orders = ordersRes?.orders || [];
                analyticsData.payments = paymentsRes?.payments || [];
                analyticsData.users = usersRes?.users || [];
                analyticsData.services = servicesRes?.services || [];
                analyticsData.refunds = refundsRes?.refunds || [];
                document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-clock"></i> Last updated: ${new Date().toLocaleString()} | Total Records: ${analyticsData.orders.length} Orders, ${analyticsData.payments.length} Payments, ${analyticsData.users.length} Users`;
                renderDashboard();
            } catch (error) { console.error('Error:', error); }
        }
        
        function filterByDate() { loadAllData(); }
        function exportToPDF() { const element = document.getElementById('dashboardContent'); html2pdf().from(element).set({ margin: 0.5, filename: 'NovaStack_Advanced_Analytics_Report.pdf' }).save(); }
        
        function renderDashboard() {
            const { orders, payments, users, services, refunds } = analyticsData;
            
            // Calculate metrics
            const totalRevenue = payments.filter(p => p.amount > 0 && p.status === 'completed').reduce((s,p) => s + p.amount, 0);
            const totalRefunds = refunds.reduce((s,r) => s + (r.amount || 0), 0);
            const completionRate = orders.filter(o => o.status === 'completed').length / orders.length * 100;
            
            // Revenue by service category
            const revenueByCategory = {};
            orders.forEach(o => { const cat = o.service_category || 'Other'; revenueByCategory[cat] = (revenueByCategory[cat] || 0) + (o.price || 0); });
            
            // Weekly order trend (last 7 days)
            const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const ordersByDay = Array(7).fill(0);
            orders.forEach(o => {
                const day = new Date(o.created_at).getDay();
                ordersByDay[day]++;
            });
            
            // Peak hours analysis
            const ordersByHour = Array(24).fill(0);
            orders.forEach(o => {
                const hour = new Date(o.created_at).getHours();
                ordersByHour[hour]++;
            });
            
            // Customer spending distribution (Top 5 customers)
            const customerSpending = {};
            orders.forEach(o => { customerSpending[o.user_name || 'Anonymous'] = (customerSpending[o.user_name || 'Anonymous'] || 0) + (o.price || 0); });
            const topCustomers = Object.entries(customerSpending).sort((a,b) => b[1] - a[1]).slice(0, 5);
            
            // Refund reasons
            const refundReasons = {};
            refunds.forEach(r => { const reason = r.reason || 'Not specified'; refundReasons[reason] = (refundReasons[reason] || 0) + 1; });
            
            // Status distribution
            const statusCount = {};
            orders.forEach(o => { statusCount[o.status] = (statusCount[o.status] || 0) + 1; });
            
            // Payment type distribution
            const paymentTypeCount = { advance: 0, balance: 0, refund: 0 };
            payments.forEach(p => { if (p.payment_type === 'advance') paymentTypeCount.advance += Math.abs(p.amount);
            else if (p.payment_type === 'balance') paymentTypeCount.balance += Math.abs(p.amount);
            else if (p.payment_type === 'refund') paymentTypeCount.refund += Math.abs(p.amount); });
            
            // Monthly revenue
            const monthlyRevenue = {};
            payments.forEach(p => { if (p.amount > 0) { const month = new Date(p.created_at).toLocaleString('default', { month: 'short' });
                monthlyRevenue[month] = (monthlyRevenue[month] || 0) + p.amount; } });
            
            // User registrations
            const userRegistrations = {};
            users.forEach(u => { if (u.created_at) { const month = new Date(u.created_at).toLocaleString('default', { month: 'short' });
                userRegistrations[month] = (userRegistrations[month] || 0) + 1; } });
            
            // Average order value trend
            const avgOrderTrend = {};
            orders.forEach(o => { const month = new Date(o.created_at).toLocaleString('default', { month: 'short' });
                if (!avgOrderTrend[month]) avgOrderTrend[month] = { total: 0, count: 0 };
                avgOrderTrend[month].total += (o.price || 0);
                avgOrderTrend[month].count++;
            });
            
            const html = `
                <!-- 8 Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${orders.length}</div><div class="stat-label">Total Orders</div></div>
                    <div class="stat-card"><div class="stat-value">${users.length}</div><div class="stat-label">Total Users</div></div>
                    <div class="stat-card"><div class="stat-value">${services.length}</div><div class="stat-label">Services</div></div>
                    <div class="stat-card"><div class="stat-value">₹${totalRevenue.toFixed(2)}</div><div class="stat-label">Revenue</div></div>
                    <div class="stat-card"><div class="stat-value">${completionRate.toFixed(1)}%</div><div class="stat-label">Completion Rate</div></div>
                </div>
                
                <!-- 15+ Charts Grid -->
                <div class="charts-grid">
                    <!-- 1. Order Status Pie Chart -->
                    <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> Order Status Distribution</h3><canvas id="statusPieChart"></canvas></div>
                    
                    <!-- 2. Payment Distribution Doughnut -->
                    <div class="chart-card"><h3><i class="fas fa-credit-card"></i> Payment Distribution</h3><canvas id="paymentDoughnutChart"></canvas></div>
                    
                    <!-- 3. Revenue by Service Category Bar Chart -->
                    <div class="chart-card"><h3><i class="fas fa-chart-bar"></i> Revenue by Service</h3><canvas id="revenueByCategoryChart"></canvas></div>
                    
                    <!-- 4. Weekly Order Trend Line Chart -->
                    <div class="chart-card"><h3><i class="fas fa-calendar-week"></i> Weekly Order Trend</h3><canvas id="weeklyTrendChart"></canvas></div>
                    
                    <!-- 5. Peak Hours Analysis Bar Chart -->
                    <div class="chart-card"><h3><i class="fas fa-clock"></i> Peak Hours Analysis</h3><canvas id="peakHoursChart"></canvas></div>
                    
                    <!-- 6. Top Customers Horizontal Bar -->
                    <div class="chart-card"><h3><i class="fas fa-trophy"></i> Top 5 Customers</h3><canvas id="topCustomersChart"></canvas></div>
                    
                    <!-- 7. Refund Reasons Pie Chart -->
                    <div class="chart-card"><h3><i class="fas fa-comment"></i> Refund Reasons</h3><canvas id="refundReasonsChart"></canvas></div>
                    
                    <!-- 8. Monthly Revenue Line Chart -->
                    <div class="chart-card full-width"><h3><i class="fas fa-chart-line"></i> Monthly Revenue Trend</h3><canvas id="monthlyRevenueChart"></canvas></div>
                    
                    <!-- 9. User Registration Trend Bar Chart -->
                    <div class="chart-card"><h3><i class="fas fa-user-plus"></i> User Registration Trend</h3><canvas id="userRegChart"></canvas></div>
                    
                    <!-- 10. Average Order Value Trend Line Chart -->
                    <div class="chart-card"><h3><i class="fas fa-chart-line"></i> Avg Order Value Trend</h3><canvas id="avgOrderChart"></canvas></div>
                    
                    <!-- 11. Cancellation Rate Radar Chart -->
                    <div class="chart-card"><h3><i class="fas fa-radar"></i> Service Performance Matrix</h3><canvas id="performanceRadarChart"></canvas></div>
                    
                    <!-- 12. Revenue vs Refund Stacked Bar -->
                    <div class="chart-card"><h3><i class="fas fa-chart-bar"></i> Revenue vs Refund</h3><canvas id="revenueRefundChart"></canvas></div>
                    
                    <!-- 13. Order Funnel Chart -->
                    <div class="chart-card"><h3><i class="fas fa-funnel-dollar"></i> Order Funnel</h3><canvas id="funnelChart"></canvas></div>
                    
                    <!-- 14. Status Treemap (as Bar) -->
                    <div class="chart-card"><h3><i class="fas fa-chart-simple"></i> Order Status Breakdown</h3><canvas id="statusBarChart"></canvas></div>
                    
                    <!-- 15. Customer Lifetime Value -->
                    <div class="chart-card"><h3><i class="fas fa-chart-line"></i> Customer Lifetime Value</h3><canvas id="clvChart"></canvas></div>
                </div>
                
                <!-- Advanced Insights -->
                <div class="insights-section">
                    <h3><i class="fas fa-microchip"></i> Advanced Analytics Insights</h3>
                    <div class="insight-grid">
                        <div class="insight-card"><div class="insight-value">${(totalRevenue/orders.length).toFixed(2)}</div><div class="insight-label">Avg Order Value</div></div>
                        <div class="insight-card"><div class="insight-value">${(orders.length/users.length).toFixed(1)}</div><div class="insight-label">Orders per User</div></div>
                        <div class="insight-card"><div class="insight-value">${((paymentTypeCount.balance/paymentTypeCount.advance)*100).toFixed(1)}%</div><div class="insight-label">Balance Collection Rate</div></div>
                        <div class="insight-card"><div class="insight-value">${((paymentTypeCount.refund/totalRevenue)*100).toFixed(1)}%</div><div class="insight-label">Refund Impact</div></div>
                        <div class="insight-card"><div class="insight-value">${Object.keys(monthlyRevenue).length}</div><div class="insight-label">Active Months</div></div>
                        <div class="insight-card"><div class="insight-value">${Object.keys(customerSpending).length}</div><div class="insight-label">Unique Customers</div></div>
                    </div>
                </div>
                
                <!-- Recent Orders Table -->
                <div class="data-table">
                    <h3><i class="fas fa-table"></i> Recent Orders (Last 20)</h3>
                    <table><thead><tr><th>ID</th><th>Customer</th><th>Service</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>${[...orders].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,20).map(o => `<tr><td>#${o.id}</td><td>${o.user_name || '—'}</td><td>${o.service_title || '—'}</td><td>₹${(o.price||0).toFixed(2)}</td><td style="color:${o.status==='completed'?'#10b981':o.status==='cancelled'?'#ef4444':'#f59e0b'}">${o.status?.replace(/_/g,' ')}</td><td>${new Date(o.created_at).toLocaleDateString()}</td>`).join('')}</tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            
            // Render all charts
            setTimeout(() => {
                // 1. Status Pie
                new Chart(document.getElementById('statusPieChart'), { type: 'pie', data: { labels: Object.keys(statusCount).map(s=>s.replace(/_/g,' ')), datasets: [{ data: Object.values(statusCount), backgroundColor: ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ff6b35'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } } });
                
                // 2. Payment Doughnut
                new Chart(document.getElementById('paymentDoughnutChart'), { type: 'doughnut', data: { labels: ['Advance','Balance','Refund'], datasets: [{ data: [paymentTypeCount.advance, paymentTypeCount.balance, paymentTypeCount.refund], backgroundColor: ['#f59e0b','#10b981','#ef4444'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } } });
                
                // 3. Revenue by Category
                new Chart(document.getElementById('revenueByCategoryChart'), { type: 'bar', data: { labels: Object.keys(revenueByCategory), datasets: [{ label: 'Revenue (₹)', data: Object.values(revenueByCategory), backgroundColor: '#ff6b35' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 4. Weekly Trend
                new Chart(document.getElementById('weeklyTrendChart'), { type: 'line', data: { labels: weekDays, datasets: [{ label: 'Orders', data: ordersByDay, borderColor: '#ff6b35', tension: 0.4, fill: true, backgroundColor: 'rgba(255,107,53,0.1)' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 5. Peak Hours
                new Chart(document.getElementById('peakHoursChart'), { type: 'bar', data: { labels: [...Array(24).keys()].map(h => `${h}:00`), datasets: [{ label: 'Orders', data: ordersByHour, backgroundColor: '#8b5cf6' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white', rotation: 45 } } } } });
                
                // 6. Top Customers
                new Chart(document.getElementById('topCustomersChart'), { type: 'bar', data: { labels: topCustomers.map(c => c[0]), datasets: [{ label: 'Spent (₹)', data: topCustomers.map(c => c[1]), backgroundColor: '#10b981' }] }, options: { responsive: true, indexAxis: 'y', scales: { x: { ticks: { color: 'white' } }, y: { ticks: { color: 'white' } } } } });
                
                // 7. Refund Reasons
                new Chart(document.getElementById('refundReasonsChart'), { type: 'pie', data: { labels: Object.keys(refundReasons), datasets: [{ data: Object.values(refundReasons), backgroundColor: ['#ef4444','#f59e0b','#10b981','#3b82f6'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white' } } } } });
                
                // 8. Monthly Revenue
                new Chart(document.getElementById('monthlyRevenueChart'), { type: 'line', data: { labels: Object.keys(monthlyRevenue), datasets: [{ label: 'Revenue (₹)', data: Object.values(monthlyRevenue), borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', tension: 0.4, fill: true }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 9. User Registration
                new Chart(document.getElementById('userRegChart'), { type: 'bar', data: { labels: Object.keys(userRegistrations), datasets: [{ label: 'New Users', data: Object.values(userRegistrations), backgroundColor: '#8b5cf6' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 10. Avg Order Value
                new Chart(document.getElementById('avgOrderChart'), { type: 'line', data: { labels: Object.keys(avgOrderTrend), datasets: [{ label: 'Avg Order Value (₹)', data: Object.values(avgOrderTrend).map(v => v.total/v.count), borderColor: '#f59e0b', tension: 0.4 }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 11. Performance Radar
                const categories = Object.keys(revenueByCategory);
                new Chart(document.getElementById('performanceRadarChart'), { type: 'radar', data: { labels: categories.slice(0,6), datasets: [{ label: 'Revenue', data: Object.values(revenueByCategory).slice(0,6), backgroundColor: 'rgba(255,107,53,0.2)', borderColor: '#ff6b35' }] }, options: { responsive: true, scales: { r: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.2)' } } } } });
                
                // 12. Revenue vs Refund
                new Chart(document.getElementById('revenueRefundChart'), { type: 'bar', data: { labels: Object.keys(monthlyRevenue), datasets: [{ label: 'Revenue', data: Object.values(monthlyRevenue), backgroundColor: '#10b981' }, { label: 'Refunds', data: Object.values(monthlyRevenue).map(() => totalRefunds/3), backgroundColor: '#ef4444' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 13. Funnel Chart
                new Chart(document.getElementById('funnelChart'), { type: 'bar', data: { labels: ['Cart Added', 'Checkout', 'Payment', 'Completed'], datasets: [{ label: 'Users', data: [orders.length, orders.length, payments.length, orders.filter(o=>o.status==='completed').length], backgroundColor: '#ff6b35' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } } });
                
                // 14. Status Bar
                new Chart(document.getElementById('statusBarChart'), { type: 'bar', data: { labels: Object.keys(statusCount).map(s=>s.replace(/_/g,' ')), datasets: [{ label: 'Orders', data: Object.values(statusCount), backgroundColor: '#3b82f6' }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white', rotation: 45 } } } } });
                
                // 15. CLV Chart
                new Chart(document.getElementById('clvChart'), { type: 'line', data: { labels: topCustomers.map(c => c[0]), datasets: [{ label: 'Lifetime Value (₹)', data: topCustomers.map(c => c[1]), borderColor: '#10b981', tension: 0.4, fill: true }] }, options: { responsive: true, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white', rotation: 45 } } } } });
            }, 100);
        }
        
        function checkAdminLogin() {
            adminToken = localStorage.getItem('nova_admin_token');
            if (!adminToken) { document.getElementById('dashboardContent').innerHTML = `<div style="text-align:center;padding:50px;"><i class="fas fa-lock" style="font-size:3rem;"></i><h3>Admin Access Required</h3><p>Please login to view analytics dashboard</p><a href="admin.html" class="btn">Go to Admin Login</a></div>`; return false; }
            return true;
        }
        
        if(checkAdminLogin()) loadAllData();
    </script>
</body>
</html>
