<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStack - Data Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .dashboard-header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: rgba(26, 22, 42, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .dashboard-header p {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
        }
        
        .last-updated {
            margin-top: 15px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b35;
        }
        
        .stat-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-top: 10px;
        }
        
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff6b35;
        }
        
        .chart-card h3 i {
            font-size: 1.3rem;
        }
        
        canvas {
            max-height: 300px;
            width: 100%;
        }
        
        /* Full width chart */
        .full-width-chart {
            grid-column: span 2;
        }
        
        /* Table Styles */
        .data-table {
            background: rgba(26, 22, 42, 0.8);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
            overflow-x: auto;
        }
        
        .data-table h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff6b35;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: #ff6b35;
            font-weight: 600;
        }
        
        td {
            color: rgba(255,255,255,0.8);
        }
        
        tr:hover td {
            background: rgba(255,255,255,0.05);
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Refresh Button */
        .refresh-btn {
            background: linear-gradient(135deg, #ff6b35, #f7c531);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
        }
        
        /* Responsive */
        @media (max-width: 1000px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .full-width-chart {
                grid-column: span 1;
            }
        }
        
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Insights Section */
        .insights-section {
            background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(247,197,49,0.05));
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255,107,53,0.3);
        }
        
        .insights-section h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #ff6b35;
        }
        
        .insight-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .insight-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,107,53,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .insight-text {
            flex: 1;
        }
        
        .insight-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .insight-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line"></i> NovaStack Data Analytics Dashboard</h1>
            <p>Real-time analytics from live database | Software Development Service Marketplace</p>
            <div class="last-updated" id="lastUpdated">Loading data...</div>
            <button class="refresh-btn" onclick="loadAllData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
        </div>
        
        <div id="dashboardContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Fetching real-time data from database...</p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API = 'https://novastack-backend.onrender.com';
        let adminToken = localStorage.getItem('nova_admin_token');
        
        // Global data storage
        let analyticsData = {
            orders: [],
            payments: [],
            users: [],
            services: [],
            refunds: [],
            customRequests: []
        };
        
        // Charts instances
        let charts = {};
        
        // ==================== API CALLS ====================
        async function apiCall(endpoint) {
            try {
                const headers = {};
                if (adminToken) {
                    headers['Authorization'] = `Bearer ${adminToken}`;
                }
                const response = await fetch(`${API}${endpoint}`, { headers });
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        // ==================== LOAD ALL DATA ====================
        async function loadAllData() {
            // Show loading
            document.getElementById('dashboardContent').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Fetching real-time data from database...</p>
                </div>
            `;
            
            try {
                // Fetch data from multiple endpoints
                const [ordersRes, paymentsRes, usersRes, servicesRes, refundsRes, customRes] = await Promise.all([
                    apiCall('/admin/orders'),
                    apiCall('/admin/payment-history'),
                    apiCall('/admin/users'),
                    apiCall('/admin/services'),
                    apiCall('/admin/refunds/history'),
                    apiCall('/custom-requests')
                ]);
                
                analyticsData.orders = ordersRes?.orders || [];
                analyticsData.payments = paymentsRes?.payments || [];
                analyticsData.users = usersRes?.users || [];
                analyticsData.services = servicesRes?.services || [];
                analyticsData.refunds = refundsRes?.refunds || [];
                analyticsData.customRequests = customRes?.requests || [];
                
                document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-clock"></i> Last updated: ${new Date().toLocaleString()}`;
                
                renderDashboard();
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('dashboardContent').innerHTML = `
                    <div style="text-align:center; padding:50px; background:rgba(239,68,68,0.1); border-radius:20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ef4444;"></i>
                        <h3 style="margin-top:20px;">Failed to load data</h3>
                        <p style="margin-top:10px;">Please check your connection or login to admin panel first.</p>
                        <button class="refresh-btn" onclick="loadAllData()" style="margin-top:20px;">Try Again</button>
                    </div>
                `;
            }
        }
        
        // ==================== RENDER DASHBOARD ====================
        function renderDashboard() {
            const orders = analyticsData.orders;
            const payments = analyticsData.payments;
            const users = analyticsData.users;
            const services = analyticsData.services;
            const refunds = analyticsData.refunds;
            
            // Calculate metrics
            const totalOrders = orders.length;
            const totalUsers = users.length;
            const totalServices = services.length;
            
            // Calculate revenue
            let totalRevenue = 0;
            payments.forEach(p => {
                if (p.amount > 0 && p.status === 'completed') {
                    totalRevenue += p.amount;
                }
            });
            
            // Order status distribution
            const statusCount = {};
            orders.forEach(o => {
                const status = o.status || 'unknown';
                statusCount[status] = (statusCount[status] || 0) + 1;
            });
            
            // Service category distribution
            const categoryCount = {};
            orders.forEach(o => {
                const category = o.service_category || o.category || 'other';
                categoryCount[category] = (categoryCount[category] || 0) + 1;
            });
            
            // Monthly revenue data
            const monthlyRevenue = {};
            payments.forEach(p => {
                if (p.amount > 0 && p.status === 'completed') {
                    const date = new Date(p.created_at);
                    const month = date.toLocaleString('default', { month: 'short' });
                    monthlyRevenue[month] = (monthlyRevenue[month] || 0) + p.amount;
                }
            });
            
            // Payment type distribution
            const paymentTypeCount = {
                advance: 0,
                balance: 0,
                refund: 0
            };
            payments.forEach(p => {
                if (p.payment_type === 'advance') paymentTypeCount.advance += Math.abs(p.amount);
                else if (p.payment_type === 'balance') paymentTypeCount.balance += Math.abs(p.amount);
                else if (p.payment_type === 'refund') paymentTypeCount.refund += Math.abs(p.amount);
            });
            
            // Refund status
            const refundStatusCount = {};
            refunds.forEach(r => {
                const status = r.status || 'pending';
                refundStatusCount[status] = (refundStatusCount[status] || 0) + 1;
            });
            
            // User registration by month
            const userRegistrations = {};
            users.forEach(u => {
                if (u.created_at) {
                    const date = new Date(u.created_at);
                    const month = date.toLocaleString('default', { month: 'short' });
                    userRegistrations[month] = (userRegistrations[month] || 0) + 1;
                }
            });
            
            // Recent orders (last 10)
            const recentOrders = [...orders].sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 10);
            
            const html = `
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-value">${totalOrders}</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-value">${totalUsers}</div>
                        <div class="stat-label">Registered Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-cube"></i></div>
                        <div class="stat-value">${totalServices}</div>
                        <div class="stat-label">Services Offered</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-value">₹${totalRevenue.toLocaleString()}</div>
                        <div class="stat-label">Total Revenue</div>
                    </div>
                </div>
                
                <!-- Charts Grid -->
                <div class="charts-grid">
                    <!-- Order Status Distribution Pie Chart -->
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-pie"></i> Order Status Distribution</h3>
                        <canvas id="statusPieChart"></canvas>
                        <div style="margin-top:15px; font-size:0.8rem; color:rgba(255,255,255,0.6); text-align:center;">
                            Total Orders: ${totalOrders} | Completed: ${statusCount['completed'] || 0} | Cancelled: ${statusCount['cancelled'] || 0}
                        </div>
                    </div>
                    
                    <!-- Payment Type Distribution Doughnut Chart -->
                    <div class="chart-card">
                        <h3><i class="fas fa-credit-card"></i> Payment Distribution</h3>
                        <canvas id="paymentDoughnutChart"></canvas>
                        <div style="margin-top:15px; font-size:0.8rem; color:rgba(255,255,255,0.6); text-align:center;">
                            Advance: ₹${paymentTypeCount.advance.toFixed(2)} | Balance: ₹${paymentTypeCount.balance.toFixed(2)} | Refund: ₹${paymentTypeCount.refund.toFixed(2)}
                        </div>
                    </div>
                    
                    <!-- Monthly Revenue Line Chart -->
                    <div class="chart-card full-width-chart">
                        <h3><i class="fas fa-chart-line"></i> Monthly Revenue Trend</h3>
                        <canvas id="revenueLineChart"></canvas>
                    </div>
                    
                    <!-- Service Category Bar Chart -->
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-bar"></i> Popular Service Categories</h3>
                        <canvas id="categoryBarChart"></canvas>
                    </div>
                    
                    <!-- User Registration Bar Chart -->
                    <div class="chart-card">
                        <h3><i class="fas fa-user-plus"></i> User Registration Trend</h3>
                        <canvas id="userRegChart"></canvas>
                    </div>
                    
                    <!-- Refund Status Pie Chart -->
                    <div class="chart-card">
                        <h3><i class="fas fa-money-bill-wave"></i> Refund Request Status</h3>
                        <canvas id="refundPieChart"></canvas>
                        <div style="margin-top:15px; font-size:0.8rem; color:rgba(255,255,255,0.6); text-align:center;">
                            Total Refunds: ${refunds.length} | Processed: ${refundStatusCount['completed'] || 0}
                        </div>
                    </div>
                </div>
                
                <!-- Insights Section -->
                <div class="insights-section">
                    <h3><i class="fas fa-lightbulb"></i> Key Business Insights</h3>
                    <div class="insight-item">
                        <div class="insight-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="insight-text">
                            <div class="insight-title">Revenue Insight</div>
                            <div class="insight-desc">Total revenue of ₹${totalRevenue.toFixed(2)} generated from ${totalOrders} orders. Average order value: ₹${(totalRevenue/totalOrders).toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="insight-item">
                        <div class="insight-icon"><i class="fas fa-percent"></i></div>
                        <div class="insight-text">
                            <div class="insight-title">Payment Pattern</div>
                            <div class="insight-desc">Advance payments: ₹${paymentTypeCount.advance.toFixed(2)} (${((paymentTypeCount.advance/totalRevenue)*100).toFixed(1)}%) | Balance payments: ₹${paymentTypeCount.balance.toFixed(2)} (${((paymentTypeCount.balance/totalRevenue)*100).toFixed(1)}%)</div>
                        </div>
                    </div>
                    <div class="insight-item">
                        <div class="insight-icon"><i class="fas fa-clock"></i></div>
                        <div class="insight-text">
                            <div class="insight-title">Order Completion Rate</div>
                            <div class="insight-desc">Completed orders: ${statusCount['completed'] || 0} (${(((statusCount['completed']||0)/totalOrders)*100).toFixed(1)}%) | Cancellation rate: ${(((statusCount['cancelled']||0)/totalOrders)*100).toFixed(1)}%</div>
                        </div>
                    </div>
                    <div class="insight-item">
                        <div class="insight-icon"><i class="fas fa-users"></i></div>
                        <div class="insight-text">
                            <div class="insight-title">User Growth</div>
                            <div class="insight-desc">Total registered users: ${totalUsers} | Average orders per user: ${(totalOrders/totalUsers).toFixed(1)}</div>
                        </div>
                    </div>
                    <div class="insight-item">
                        <div class="insight-icon"><i class="fas fa-money-bill-wave"></i></div>
                        <div class="insight-text">
                            <div class="insight-title">Refund Analysis</div>
                            <div class="insight-desc">Total refund amount: ₹${paymentTypeCount.refund.toFixed(2)} (${((paymentTypeCount.refund/totalRevenue)*100).toFixed(1)}% of revenue)</div>
                        </div>
                    </div>
                </div>
                
                <!-- Recent Orders Table -->
                <div class="data-table">
                    <h3><i class="fas fa-table"></i> Recent Orders</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Service</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recentOrders.map(order => `
                                    <tr>
                                        <td>#${order.id}</td>
                                        <td>${order.user_name || '—'}</td>
                                        <td>${order.service_title || '—'}</td>
                                        <td>₹${(order.price || 0).toFixed(2)}</td>
                                        <td><span style="color: ${order.status === 'completed' ? '#10b981' : order.status === 'cancelled' ? '#ef4444' : '#f59e0b'}">${order.status?.replace(/_/g, ' ')}</span></td>
                                        <td>${new Date(order.created_at).toLocaleDateString()}</td>
                                    </tr>
                                `).join('')}
                                ${recentOrders.length === 0 ? '<tr><td colspan="6" style="text-align:center">No orders found</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
            
            // Render all charts after DOM is updated
            setTimeout(() => {
                renderCharts({
                    statusCount,
                    paymentTypeCount,
                    monthlyRevenue,
                    categoryCount,
                    userRegistrations,
                    refundStatusCount
                });
            }, 100);
        }
        
        // ==================== RENDER CHARTS ====================
        function renderCharts(data) {
            // Destroy existing charts
            Object.values(charts).forEach(chart => {
                if (chart) chart.destroy();
            });
            
            // 1. Order Status Pie Chart
            const statusCtx = document.getElementById('statusPieChart')?.getContext('2d');
            if (statusCtx) {
                const statusLabels = Object.keys(data.statusCount);
                const statusValues = Object.values(data.statusCount);
                const statusColors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ff6b35'];
                
                charts.statusPie = new Chart(statusCtx, {
                    type: 'pie',
                    data: {
                        labels: statusLabels.map(s => s.replace(/_/g, ' ')),
                        datasets: [{
                            data: statusValues,
                            backgroundColor: statusColors.slice(0, statusLabels.length),
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} orders (${((ctx.raw / statusValues.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)` } }
                        }
                    }
                });
            }
            
            // 2. Payment Distribution Doughnut Chart
            const paymentCtx = document.getElementById('paymentDoughnutChart')?.getContext('2d');
            if (paymentCtx) {
                charts.paymentDoughnut = new Chart(paymentCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Advance Payment', 'Balance Payment', 'Refund'],
                        datasets: [{
                            data: [data.paymentTypeCount.advance, data.paymentTypeCount.balance, data.paymentTypeCount.refund],
                            backgroundColor: ['#f59e0b', '#10b981', '#ef4444'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ₹${ctx.raw.toFixed(2)}` } }
                        }
                    }
                });
            }
            
            // 3. Monthly Revenue Line Chart
            const revenueCtx = document.getElementById('revenueLineChart')?.getContext('2d');
            if (revenueCtx) {
                const months = Object.keys(data.monthlyRevenue);
                const revenues = Object.values(data.monthlyRevenue);
                
                charts.revenueLine = new Chart(revenueCtx, {
                    type: 'line',
                    data: {
                        labels: months,
                        datasets: [{
                            label: 'Revenue (₹)',
                            data: revenues,
                            borderColor: '#ff6b35',
                            backgroundColor: 'rgba(255,107,53,0.1)',
                            tension: 0.4,
                            fill: true,
                            pointBackgroundColor: '#ff6b35',
                            pointBorderColor: 'white',
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `Revenue: ₹${ctx.raw.toFixed(2)}` } }
                        },
                        scales: {
                            x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                            y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' }, title: { display: true, text: 'Revenue (₹)', color: 'white' } }
                        }
                    }
                });
            }
            
            // 4. Service Category Bar Chart
            const categoryCtx = document.getElementById('categoryBarChart')?.getContext('2d');
            if (categoryCtx) {
                const categories = Object.keys(data.categoryCount);
                const counts = Object.values(data.categoryCount);
                
                charts.categoryBar = new Chart(categoryCtx, {
                    type: 'bar',
                    data: {
                        labels: categories.map(c => c.toUpperCase()),
                        datasets: [{
                            label: 'Number of Orders',
                            data: counts,
                            backgroundColor: '#ff6b35',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.raw} orders` } }
                        },
                        scales: {
                            x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                            y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' }, title: { display: true, text: 'Number of Orders', color: 'white' } }
                        }
                    }
                });
            }
            
            // 5. User Registration Chart
            const userRegCtx = document.getElementById('userRegChart')?.getContext('2d');
            if (userRegCtx) {
                const months = Object.keys(data.userRegistrations);
                const counts = Object.values(data.userRegistrations);
                
                charts.userReg = new Chart(userRegCtx, {
                    type: 'bar',
                    data: {
                        labels: months,
                        datasets: [{
                            label: 'New Users',
                            data: counts,
                            backgroundColor: '#8b5cf6',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.raw} new users` } }
                        },
                        scales: {
                            x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                            y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' }, title: { display: true, text: 'Number of Users', color: 'white' } }
                        }
                    }
                });
            }
            
            // 6. Refund Status Pie Chart
            const refundCtx = document.getElementById('refundPieChart')?.getContext('2d');
            if (refundCtx) {
                const statusLabels = Object.keys(data.refundStatusCount);
                const statusValues = Object.values(data.refundStatusCount);
                const refundColors = ['#f59e0b', '#3b82f6', '#10b981', '#ef4444'];
                
                charts.refundPie = new Chart(refundCtx, {
                    type: 'pie',
                    data: {
                        labels: statusLabels,
                        datasets: [{
                            data: statusValues,
                            backgroundColor: refundColors.slice(0, statusLabels.length),
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: 'white' } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} requests` } }
                        }
                    }
                });
            }
        }
        
        // ==================== CHECK ADMIN LOGIN ====================
        async function checkAdminLogin() {
            adminToken = localStorage.getItem('nova_admin_token');
            if (!adminToken) {
                // Try to login with stored credentials or show login
                document.getElementById('dashboardContent').innerHTML = `
                    <div style="text-align:center; padding:50px; background:rgba(0,0,0,0.5); border-radius:20px;">
                        <i class="fas fa-lock" style="font-size:3rem; color:#ff6b35;"></i>
                        <h3 style="margin-top:20px;">Admin Access Required</h3>
                        <p style="margin-top:10px;">Please login to view analytics dashboard</p>
                        <a href="admin.html" class="refresh-btn" style="display:inline-block; text-decoration:none;">Go to Admin Login</a>
                    </div>
                `;
                return false;
            }
            return true;
        }
        
        // ==================== INITIALIZE ====================
        async function init() {
            const isLoggedIn = await checkAdminLogin();
            if (isLoggedIn) {
                loadAllData();
            }
        }
        
        init();
    </script>
</body>
</html>
