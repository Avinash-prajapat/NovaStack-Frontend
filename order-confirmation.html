<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — DevCraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0f0c1a;
      --bg-secondary: #1a162a;
      --surface: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --accent: #ff6b35;
      --green: #10b981;
      --border: rgba(255, 255, 255, 0.12);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .confirmation-container {
      max-width: 600px;
      width: 100%;
    }
    
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .confirmation-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      text-align: center;
      animation: scaleIn 0.5s ease-out;
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
      color: white;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
    }
    
    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--green);
    }
    
    .order-id {
      background: var(--surface);
      padding: 1rem;
      border-radius: 12px;
      margin: 1.5rem 0;
      font-family: monospace;
      font-size: 1.1rem;
    }
    
    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #25D366;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      margin: 1.5rem 0;
      transition: transform 0.3s ease;
    }
    
    .whatsapp-btn:hover {
      transform: translateY(-2px);
    }
    
    .btn-primary {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #ff6b35 0%, #f7c531 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
    }
    
    .note {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="confirmation-container">
    <div class="logo">Dev<span>Craft</span></div>
    
    <div class="confirmation-card">
      <div class="success-icon">
        <i class="fas fa-check"></i>
      </div>
      
      <h2>Order Confirmed!</h2>
      <p style="margin-bottom: 1rem;">Thank you for your advance payment.</p>
      
      <div class="order-id" id="order-id-display">
        Loading...
      </div>
      
      <a href="#" id="whatsapp-link" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
        Chat on WhatsApp
      </a>
      
      <p class="note">
        <i class="fas fa-info-circle"></i>
        Our team will contact you within 24 hours to start your project.
      </p>
      
      <a href="services.html" class="btn-primary">
        Browse More Services <i class="fas fa-arrow-right"></i>
      </a>
    </div>
  </div>
  
  <script>
    const WA_NUMBER = '923001234567';
    
    // Get order ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order');
    
    document.getElementById('order-id-display').textContent = orderId ? `Order #${orderId}` : 'Order Confirmed';
    
    const message = encodeURIComponent(
      `Hi! I've just placed an order #${orderId || ''} and paid the advance.`
    );
    document.getElementById('whatsapp-link').href = `https://wa.me/${WA_NUMBER}?text=${message}`;
  </script>
</body>
</html>
